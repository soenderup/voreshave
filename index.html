            </div>
        </div>
        <div id="search-results">${renderSearchResults(searchQuery)}</div>`;
}

function renderSearchResults(q) {
    if (!q || q.trim().length < 1) {
        return `<div class="search-empty">
            <div class="search-empty-icon">🌿</div>
            <div>Skriv et plantenavn, et latinsk navn<br>eller en zone for at søge</div>
        </div>`;
    }
    const term = q.trim().toLowerCase();

    const matchedPlants = db.plants.filter(p =>
        (p.name || '').toLowerCase().includes(term) ||
        (p.latinName || '').toLowerCase().includes(term) ||
        (p.description || '').toLowerCase().includes(term)
    );

    const matchedZones = db.zones.filter(z =>
        (z.name || '').toLowerCase().includes(term) ||
        (z.description || '').toLowerCase().includes(term)
    );

    if (matchedPlants.length === 0 && matchedZones.length === 0) {
        return `<div class="search-empty">
            <div class="search-empty-icon">🤷</div>
            <div>Ingen resultater for<br><strong>${q}</strong></div>
        </div>`;
    }

    let html = '';

    if (matchedPlants.length > 0) {
        html += `<div class="search-section-label">Planter (${matchedPlants.length})</div>`;
        html += matchedPlants.map(p => {
            const z = zone(p.zoneId);
            const thumb = p.photo
                ? `<img class="search-result-thumb" src="${p.photo}" alt="">`
                : `<div class="search-result-icon">🌱</div>`;
            const meta = [p.latinName, z ? z.name : null].filter(Boolean).join(' · ');
            return `<div class="search-result-row" onclick="goTo('plant','${p.zoneId}','${p.id}')">
                ${thumb}
                <div>
                    <div class="search-result-name">${p.name}</div>
                    ${meta ? `<div class="search-result-meta">${meta}</div>` : ''}
                </div>
                <span class="search-result-arrow">›</span>
            </div>`;
        }).join('');
    }

    if (matchedZones.length > 0) {
        html += `<div class="search-section-label">Zoner (${matchedZones.length})</div>`;
        html += matchedZones.map(z => {
            const plantsInZone = db.plants.filter(p => p.zoneId === z.id).length;
            const areaName = z.area ? (z.area.charAt(0).toUpperCase() + z.area.slice(1)) : '';
            const meta = [areaName, plantsInZone > 0 ? `${plantsInZone} element${plantsInZone !== 1 ? 'er' : ''}` : null].filter(Boolean).join(' · ');
            const thumb = z.photo
                ? `<img class="search-result-thumb" src="${z.photo}" alt="">`
                : `<div class="search-result-icon">🌿</div>`;
            return `<div class="search-result-row" onclick="goTo('home');setTimeout(()=>{expandZone('${z.id}')},150)">
                ${thumb}
                <div>
                    <div class="search-result-name">${z.name}</div>
                    ${meta ? `<div class="search-result-meta">${meta}</div>` : ''}
                </div>
                <span class="search-result-arrow">›</span>
            </div>`;
        }).join('');
    }

    return html;
}

let searchQuery = '';
function updateSearch() {
    const inp = document.getElementById('search-input');
    if (!inp) return;
    searchQuery = inp.value;
    const results = document.getElementById('search-results');
    if (results) results.innerHTML = renderSearchResults(searchQuery);
    // Opdater clear-knap
    const wrap = document.querySelector('.search-input-row');
    if (wrap) {
        const existing = wrap.querySelector('.search-clear');
        if (searchQuery && !existing) {
            const btn = document.createElement('button');
            btn.className = 'search-clear';
            btn.textContent = '✕';
            btn.onclick = clearSearch;
            wrap.appendChild(btn);
        } else if (!searchQuery && existing) {
            existing.remove();
        }
    }
}
function clearSearch() {
    searchQuery = '';
    const inp = document.getElementById('search-input');
    if (inp) { inp.value = ''; inp.focus(); }
    const results = document.getElementById('search-results');
    if (results) results.innerHTML = renderSearchResults('');
    const btn = document.querySelector('.search-clear');
    if (btn) btn.remove();
}
function expandZone(zid) {
    collapsedZones.delete(zid);
    // Fold alle parent-zoner op
    let z = zone(zid);
    while (z && z.parentZoneId) {
        collapsedZones.delete(z.parentZoneId);
        z = zone(z.parentZoneId);
    }
    render();
}

function renderCalendar() {
    const year = nav.calYear, month = nav.calMonth;
    const monthName = new Date(year, month, 1).toLocaleDateString('da-DK', { month: 'long', year: 'numeric' });
    const firstDay = new Date(year, month, 1).getDay(); // 0=sun
    const startOffset = (firstDay === 0 ? 6 : firstDay - 1); // mon-based
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = new Date().toISOString().slice(0,10);
    const selStr = nav.calSelected;

    const events = calEventSource();
    // Build set of dates with events this month
    const dotsByDate = {};
    events.forEach(e => {
        if (!e.date) return;
        const d = new Date(e.date);
        if (d.getFullYear() === year && d.getMonth() === month) {
            const key = e.date;
            if (!dotsByDate[key]) dotsByDate[key] = { upcoming: 0, history: 0 };
            dotsByDate[key][e.kind]++;
        }
    });

    // Grid cells
    let cells = '';
    for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dots = dotsByDate[iso] || {};
        const isToday = iso === todayStr;
        const isSel = iso === selStr;
        let cls = 'cal-day';
        if (isToday) cls += ' today';
        if (isSel && !isToday) cls += ' selected';
        const dotsHTML = [
            ...(Array(Math.min(dots.upcoming||0, 3)).fill('<span class="cal-dot upcoming"></span>')),
            ...(Array(Math.min(dots.history||0, 3)).fill('<span class="cal-dot history"></span>'))
        ].join('');
        cells += `<div class="${cls}" onclick="calSelectDay('${iso}')">
            <span class="cal-day-num">${d}</span>
            ${dotsHTML ? `<div class="cal-dots">${dotsHTML}</div>` : ''}
        </div>`;
    }

    // Events list
    let listHTML = '';
    const filterDate = selStr && new Date(selStr).getFullYear() === year && new Date(selStr).getMonth() === month ? selStr : null;

    // Upcoming
    let upcomingEvents = events.filter(e => e.kind === 'upcoming');
    if (filterDate) upcomingEvents = upcomingEvents.filter(e => e.date === filterDate);
    upcomingEvents.sort((a,b) => a.date.localeCompare(b.date));

    // History
    let histEvents = events.filter(e => e.kind === 'history');
    if (filterDate) histEvents = histEvents.filter(e => e.date === filterDate);
    histEvents.sort((a,b) => b.date.localeCompare(a.date));

    function eventCard(e) {
        const d = new Date(e.date);
        const day = d.getDate();
        const mon = d.toLocaleDateString('da-DK', { month: 'short' });
        const who = entityName(e.entityType, e.entityId);
        const isPast = e.date < todayStr;
        const tag = e.kind === 'history'
            ? `<span class="cal-event-tag history">Udført</span>`
            : isPast
                ? `<span class="cal-event-tag overdue">Overskredet</span>`
                : `<span class="cal-event-tag upcoming">Kommende</span>`;
        const clickAttr = canEdit() && e.kind === 'upcoming' && e.rid
            ? `onclick="openEditReminder('${e.rid}')" style="cursor:pointer"`
            : canEdit() && e.kind === 'history' && e.hid
            ? `onclick="openEditHistoryItem('${e.hid}')" style="cursor:pointer"`
            : '';
        const deleteBtn = canEdit() && e.kind === 'history' && e.hid
            ? `<button onclick="doDeleteHistory('${e.hid}');event.stopPropagation()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0;flex-shrink:0" title="Slet">×</button>`
            : canEdit() && e.kind === 'upcoming' && e.rid
            ? `<button onclick="if(confirm('Slet påmindelse?')){db.reminders=db.reminders.filter(r=>r.id!=='${e.rid}');saveDB();render();}event.stopPropagation()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0;flex-shrink:0" title="Slet">×</button>`
            : '';
        return `<div class="cal-event" ${clickAttr} style="display:flex;align-items:flex-start;gap:0.5rem">
            <div class="cal-event-date">
                <div class="cal-event-day">${day}</div>
                <div class="cal-event-month">${mon}</div>
            </div>
            <div class="cal-event-body" style="flex:1">
                <div class="cal-event-text">${e.text}${tag}</div>
                ${who ? `<div class="cal-event-who">${who}</div>` : ''}
            </div>
            ${deleteBtn}
        </div>`;
    }

    const upcomingSection = upcomingEvents.length === 0 ? '' : `
        <div class="cal-section">
            <div class="cal-section-title">Kommende${filterDate ? ' — ' + formatDate(filterDate) : ''}</div>
            ${upcomingEvents.map(eventCard).join('')}
        </div>`;

    const histSection = histEvents.length === 0 ? '' : `
        <div class="cal-section">
            <div class="cal-section-title">Historik${filterDate ? ' — ' + formatDate(filterDate) : ''}</div>
            ${histEvents.map(eventCard).join('')}
        </div>`;

    const emptyMsg = (!upcomingSection && !histSection)
        ? `<div class="empty-state"><span class="empty-icon">📅</span>${filterDate ? 'Ingen aktiviteter denne dag' : 'Ingen aktiviteter denne måned'}</div>` : '';

    return `
        <div class="cal-month-nav">
            <button class="cal-month-btn" onclick="calPrev()">‹</button>
            <span class="cal-month-label">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}</span>
            <button class="cal-month-btn" onclick="calNext()">›</button>
        </div>
        <div class="cal-grid">
            <div class="cal-weekdays">
                ${['Ma','Ti','On','To','Fr','Lø','Sø'].map(d => `<div class="cal-wd">${d}</div>`).join('')}
            </div>
            <div class="cal-days">${cells}</div>
        </div>
        <div style="padding:0.4rem 1rem;display:flex;gap:0.8rem;align-items:center;border-bottom:1px solid var(--border);background:var(--white)">
            <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.72rem;color:var(--muted)"><span class="cal-dot upcoming" style="width:7px;height:7px;display:inline-block"></span>Kommende</span>
            <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.72rem;color:var(--muted)"><span class="cal-dot history" style="width:7px;height:7px;display:inline-block"></span>Udført</span>
            ${filterDate ? `<button onclick="calSelectDay(null)" style="margin-left:auto;font-size:0.72rem;background:none;border:none;color:var(--terra);cursor:pointer">Vis alle ×</button>` : ''}
        </div>
        ${upcomingSection}
        ${histSection}
        ${emptyMsg}
        <div style="height:1rem"></div>`;
}

function calSelectDay(iso) {

function calPrev() {
    if (nav.calMonth === 0) { nav.calMonth = 11; nav.calYear--; }
    else nav.calMonth--;

}

function calNext() {
    if (nav.calMonth === 11) { nav.calMonth = 0; nav.calYear++; }
    else nav.calMonth++;
    nav.calSelected = null;
    render();
}

function toggleArea(areaKey) {
    if (collapsedAreas.has(areaKey)) {
        // Åbn denne, luk alle andre — og kollaps alle zoner i det nye område
        collapsedAreas = new Set(Object.keys(AREAS));
        collapsedAreas.delete(areaKey);
        db.zones.filter(z => (z.area || 'baghave') === areaKey)
                .forEach(z => collapsedZones.add(z.id));
    } else {
        // Luk dette område
        collapsedAreas.add(areaKey);
    }
    render();
}

function toggleZone(zid) {
    const wasCollapsed = collapsedZones.has(zid);
    if (wasCollapsed) {
        collapsedZones.delete(zid);
    } else {
        collapsedZones.add(zid);
    }
    // Accordion: luk søskende-zoner når en zone åbnes
    if (!collapsedZones.has(zid)) {
        const z = zone(zid);
        if (z) {
            db.zones
                .filter(s => s.id !== zid &&
                    (s.area || 'baghave') === (z.area || 'baghave') &&
                    (s.parentZoneId || null) === (z.parentZoneId || null))
                .forEach(s => collapsedZones.add(s.id));
        }
    }
    render();
    // Scroll åbnet zone til toppen af #app
    if (wasCollapsed) {
        requestAnimationFrame(() => {
            const appEl = document.getElementById('app');
            const el = document.querySelector('[data-zone-id="' + zid + '"]');
            if (el && appEl) {
                const offset = el.getBoundingClientRect().top - appEl.getBoundingClientRect().top + appEl.scrollTop;
                appEl.scrollTo({ top: offset, behavior: 'smooth' });
            }
        });
    }
}

function completeReminder(rid) {
    const r = db.reminders.find(x => x.id === rid);
    if (!r) return;
    const today = new Date().toISOString().slice(0,10);
    r.completedDates.push(today);
    // Add to history
    db.history.push({ id: uuid(), entityType: r.entityType, entityId: r.entityId, date: today, text: r.text, fromReminder: true, createdBy: currentUser() });
    if (r.repeat === 'none') {
        db.reminders = db.reminders.filter(x => x.id !== rid);
    } else if (r.repeat === 'yearly') {
        const d = new Date(r.date); d.setFullYear(d.getFullYear() + 1);
        r.date = d.toISOString().slice(0,10);
    } else if (r.repeat === 'monthly') {
        const d = new Date(r.date); d.setMonth(d.getMonth() + 1);
        r.date = d.toISOString().slice(0,10);
    }
    saveDB();
    render();
}

function deleteZoneData(zid) {
    const plantIds = db.plants.filter(p => p.zoneId === zid).map(p => p.id);
    db.plants = db.plants.filter(p => p.zoneId !== zid);
    db.reminders = db.reminders.filter(r => !(r.entityType === 'zone' && r.entityId === zid) && !plantIds.includes(r.entityId));
    db.history = db.history.filter(h => !(h.entityType === 'zone' && h.entityId === zid) && !plantIds.includes(h.entityId));
    db.zones = db.zones.filter(z => z.id !== zid);
}

function deleteZone(zid) {
    const z = zone(zid);
    const subs = subZones(zid);
    const subsMsg = subs.length > 0 ? ` og ${subs.length} under-zone${subs.length !== 1 ? 'r' : ''}` : '';
    if (!confirm(`Slet denne zone${subsMsg} og alle dens elementer?`)) return;
    const parentId = z?.parentZoneId || null;
    subs.forEach(sz => deleteZoneData(sz.id));
    deleteZoneData(zid);
    saveDB(); closeSheet();
    goTo('home');
}

function submitEditPlant(pid) {
    const p = plant(pid);
    if (!p) return;
    const oldLatin = p.latinName;
    const oldNote = p.note;
    const newZoneId = document.getElementById('f-zone')?.value;
    const oldZoneId = p.zoneId;
    const movingFromDirect = newZoneId && newZoneId !== oldZoneId && isDirectZone(oldZoneId);
    if (newZoneId === '__direct__') {
        const areaKey = document.getElementById('f-area')?.value || 'baghave';
        const name = document.getElementById('f-name').value.trim() || p.name;
        const dz = { id: uuid(), name, type: 'andet', area: areaKey, description: '', parentZoneId: null, isDirect: true };
        db.zones.push(dz);
        p.zoneId = dz.id;
    } else if (newZoneId) {
        p.zoneId = newZoneId;
    }
    p.name = document.getElementById('f-name').value.trim() || p.name;
    p.latinName = document.getElementById('f-latin').value.trim();
    p.type = document.getElementById('f-type').value;
    const qtyE = parseInt(document.getElementById('f-qty').value) || 1;
    p.quantity = qtyE > 1 ? qtyE : null;
    p.plantedDate = document.getElementById('f-date').value;
    p.note = document.getElementById('f-note').value.trim();
    p.infoLink = document.getElementById('f-link').value.trim();
    // Auto-slet tom direkte zone ved flytning
    if (movingFromDirect && zonePlants(oldZoneId).length === 0) {
        db.zones = db.zones.filter(z => z.id !== oldZoneId);
    }
    saveDB(); closeSheet();
    goTo('plant', p.zoneId, pid);
    if (p.latinName !== oldLatin || p.note !== oldNote) fetchPlantInfo(pid);
}

async function fetchPlantInfo(pid) {
    const p = plant(pid);
    if (!p) return;
    const setStatus = (msg) => {
        const el = document.getElementById('ai-status');
        if (el) el.textContent = msg;
    };
    const showRetry = () => {
        const btn = document.getElementById('ai-retry');
        if (btn) btn.style.display = 'block';
    };
    try {
        setStatus('Henter planteinfo...');
        const res = await fetch('/.netlify/functions/plant-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: p.name, latinName: p.latinName, plantType: p.type, note: p.note }),
        });
        if (!res.ok) {
            setStatus(`Fejl ${res.status} – funktionen svarede ikke korrekt.`);
            showRetry();
            return;
        }
        const data = await res.json();
        const fresh = plant(pid);
        if (fresh) {
            if (data.info) fresh.aiInfo = data.info;
            if (data.water) fresh.water = data.water;
            if (data.light) fresh.light = data.light;
            const _dn = parseDrainage(data.drainage); if (_dn) fresh.drainage = _dn;
            if (data.perennial != null) fresh.perennial = data.perennial;
            saveDB();
        }
    } catch (e) {
        logError('fetchPlantInfo fejlede: ' + e.message, 'fetchPlantInfo', '', e);
        setStatus('Netværksfejl – er du online?');
        showRetry();
    }
}

function refreshPlantInfo(pid) {
    const p = plant(pid);
    if (p) { p.aiInfo = null; render(); fetchPlantInfo(pid); }
}

}

let migrating = false;
async function migrateAllCareData() {
    if (migrating) return;
    migrating = true;
    const targets = db.plants.filter(p => p.water == null && p.light == null);
    let done = 0;
    const updateBanner = () => {
        const el = document.getElementById('migrate-banner');
        if (el) el.innerHTML = `<span>🌿 Udfylder trivseldata... (${done}/${targets.length})</span>`;
    };
    updateBanner();
    for (const p of targets) {
        try {
            const res = await fetch('/.netlify/functions/plant-info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: p.name, latinName: p.latinName, plantType: p.type, note: p.note }),
            });
            if (res.ok) {
                const data = await res.json();
                const fresh = plant(p.id);
                if (fresh) {
                    if (data.water) fresh.water = data.water;
                    if (data.light) fresh.light = data.light;
                    if (data.perennial != null) fresh.perennial = data.perennial;
                }
            }
        } catch (e) { /* fortsæt */ }
        done++;
        updateBanner();
        saveDB();
        await new Promise(r => setTimeout(r, 300)); // lille pause
    }
    migrating = false;
    render();
}

function deletePlant(pid) {

    db.plants = db.plants.filter(x => x.id !== pid);

    db.history = db.history.filter(h => !(h.entityType === 'plant' && h.entityId === pid));

    if (wasDirectZone && zonePlants(zid).length === 0) {
        db.zones = db.zones.filter(z => z.id !== zid);

// ── PIN & BRUGER ──
let pinBuffer = '';
let pinTemp = '';
let pinMode = '';
let setupName = '';

function currentUser()    { return sessionStorage.getItem('voreshave-user') || ''; }
function currentUserObj() { return users.find(u => u.name === currentUser()) || null; }
function isGuest()        { return currentUserObj()?.role === 'guest'; }
function canEdit()        { return currentUserObj()?.role === 'admin'; }
function canLog()         { return ['admin','member'].includes(currentUserObj()?.role); }
function canManageUsers() { return currentUserObj()?.role === 'admin'; }

function checkAccess() {
    if (sessionStorage.getItem('voreshave-unlocked') === '1') return true;
    // Husk mig: auto-login hvis brugeren er husket på denne enhed
    const remembered = localStorage.getItem('voreshave-remember');
    if (remembered && users.find(u => u.name === remembered)) {
        unlockAs(remembered);
        return true;
    }
    if (remembered) localStorage.removeItem('voreshave-remember'); // bruger findes ikke længere
    const hasPins = users.some(u => u.pin);
    showLockscreen(hasPins ? 'enter' : 'nameselect');
    return false;
}

function showLockscreen(mode) {
    pinMode = mode;
    pinBuffer = '';
    document.getElementById('lockscreen').classList.add('visible');
    updateDots();
    document.getElementById('ls-error').textContent = '';

    const subtitles = {
        nameselect: 'Hvem er du?',
        setup:      `Vælg PIN for ${setupName}`,
        setup2:     'Gentag koden for at bekræfte',
        enter:      'Indtast din PIN',
    };
    document.getElementById('ls-subtitle').textContent = subtitles[mode] || '';

    const showDots = mode !== 'nameselect';
    document.querySelector('.ls-dots').style.display = showDots ? 'flex' : 'none';
    document.querySelector('.ls-error').style.display = showDots ? 'block' : 'none';

    const content = document.getElementById('ls-content');
    if (mode === 'nameselect') {
        const nonGuestUsers = users.filter(u => u.role !== 'guest');
        const guestUser = users.find(u => u.role === 'guest');
        content.innerHTML = `<div class="ls-users">
            ${nonGuestUsers.map(u => `<button class="ls-user-btn" onclick="selectSetupName('${u.name}')">${u.name}</button>`).join('')}
            ${guestUser ? `<button class="ls-user-btn ls-guest-btn" onclick="unlockAs('${guestUser.name}')">👤 Fortsæt som gæst</button>` : ''}
        </div>`;
    } else {
        const showRemember = mode === 'enter';
        content.innerHTML = `<div class="ls-pad">
            ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k =>
                k === '' ? '<div class="ls-key empty"></div>'
                         : `<button class="ls-key" onclick="pinKey('${k}')">${k}</button>`
            ).join('')}
        </div>
        ${showRemember ? `<label class="ls-remember">
            <input type="checkbox" id="ls-remember-cb">
            Husk mig på denne enhed
        </label>` : ''}`;
    }
}

function updateDots() {
    for (let i = 0; i < 6; i++) {
        document.getElementById('d' + i)?.classList.toggle('filled', i < pinBuffer.length);
    }
}

function pinKey(k) {
    if (k === '⌫') { pinBuffer = pinBuffer.slice(0, -1); updateDots(); return; }
    if (pinBuffer.length >= 6) return;
    pinBuffer += k;
    updateDots();
    if (pinBuffer.length === 6) setTimeout(() => submitPin(), 180);
}

function submitPin() {
    if (pinMode === 'setup') {
        pinTemp = pinBuffer; pinBuffer = ''; showLockscreen('setup2');
    } else if (pinMode === 'setup2') {
        if (pinBuffer === pinTemp) {
            const u = users.find(u => u.name === setupName);
            if (u) { u.pin = pinBuffer; } else {
                users.push({ id: uuid(), name: setupName, pin: pinBuffer, role: 'member', initials: setupName[0] });
            }
            saveUsers();
            pinTemp = '';
            unlockAs(setupName);
        } else {
            document.getElementById('ls-error').textContent = 'Koderne matcher ikke';
            pinBuffer = ''; pinTemp = ''; updateDots();
            setTimeout(() => showLockscreen('setup'), 1200);
        }
    } else if (pinMode === 'enter') {
        const match = users.find(u => u.pin === pinBuffer);
        if (match) {
            const rememberCb = document.getElementById('ls-remember-cb');
            if (rememberCb?.checked) {
                localStorage.setItem('voreshave-remember', match.name);
            }
            unlockAs(match.name);
        } else {
            document.getElementById('ls-error').textContent = 'Forkert kode — prøv igen';
            pinBuffer = ''; updateDots();
        }
    }
}

function selectSetupName(name) {
    setupName = name;
    showLockscreen('setup');
}

function startChangePinFor(name) {
    closeSheet();
    setupName = name;
    showLockscreen('setup');
}

function getDevice() {
    const ua = navigator.userAgent;
    if (/iPhone/.test(ua)) return 'iPhone';
    if (/iPad/.test(ua)) return 'iPad';
    if (/Android/.test(ua)) return 'Android';
    if (/Macintosh/.test(ua)) return 'Mac';
    if (/Windows/.test(ua)) return 'Windows';
    return 'Ukendt';
}

function unlockAs(name) {
    sessionStorage.setItem('voreshave-unlocked', '1');
    sessionStorage.setItem('voreshave-user', name);
    // Log login-hændelse
    const entry = { user: name, time: new Date().toISOString(), device: getDevice() };
    // Hent eksisterende, tilføj ny, trim til max 100, gem
    LOGINLOG_REF.get().then(snap => {
        const existing = snap.exists ? (snap.data().entries || []) : [];
        const trimmed = [...existing, entry].slice(-100);
        LOGINLOG_REF.set({ entries: trimmed });
    }).catch(() => LOGINLOG_REF.set({ entries: [entry] }));
    document.getElementById('lockscreen').classList.remove('visible');
    render();
}

async function migrateAllDrainage() {
    const plants = db.plants || [];
    if (plants.length === 0) { alert('Ingen planter fundet.'); return; }
    closeSheet();
    openSheet('🔄 Opdaterer jordbund...', `
        <div style="padding:1.2rem">
            <div id="migrate-status" style="font-size:0.88rem;color:var(--muted)">Starter...</div>
            <div id="migrate-bar" style="margin-top:0.8rem;height:6px;border-radius:3px;background:var(--border)">
                <div id="migrate-fill" style="height:100%;border-radius:3px;background:var(--green-mid);width:0%;transition:width 0.3s"></div>
            </div>
        </div>
    `);
    let done = 0, errors = 0;
    for (const p of plants) {
        const status = document.getElementById('migrate-status');
        const fill = document.getElementById('migrate-fill');
        if (status) status.textContent = `${done + 1}/${plants.length}: ${p.name}`;
        try {
            const res = await fetch('/.netlify/functions/plant-info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: p.name, latinName: p.latinName || '', plantType: p.type || '', note: '' }),
            });
            if (res.ok) {
                const data = await res.json();
                const fresh = db.plants.find(x => x.id === p.id);
                if (fresh) {
                    const _dn = parseDrainage(data.drainage); if (_dn) fresh.drainage = _dn;
                    if (status) status.textContent = `${done + 1}/${plants.length}: ${p.name} → ${data.drainage || '(ingen drainage)'}`;
                }
            }
        } catch (e) { errors++; }
        done++;
        if (fill) fill.style.width = Math.round(done / plants.length * 100) + '%';
        await new Promise(r => setTimeout(r, 300)); // lille pause mellem kald
    }
    saveDB();
    const status = document.getElementById('migrate-status');
    if (status) status.textContent = `✓ Færdig — ${done} planter opdateret${errors ? `, ${errors} fejl` : ''}`;
}

// ── REGISTRERINGSTJEK ──
function runLocalChecks() {
    const issues = [];

    // 1. Forældreløse planter (zoneId peger ingen steder)
    db.plants.forEach(p => {
        if (!db.zones.find(z => z.id === p.zoneId)) {
            issues.push({ severity: 'error', message: `"${p.name}" peger på en zone der ikke findes`, detail: `Zone-id: ${p.zoneId}`, action: `openEditPlant('${p.id}')` });
        }
    });

    // 2. Forældreløse påmindelser
    db.reminders.forEach(r => {
        const exists = r.entityType === 'plant' ? db.plants.find(p => p.id === r.entityId) : db.zones.find(z => z.id === r.entityId);
        if (!exists) issues.push({ severity: 'error', message: `Påmindelsen "${r.text}" peger på element der ikke findes`, detail: `Id: ${r.entityId}`, action: null });
    });

    // 3. Forældreløse historik-noter
    db.history.forEach(h => {
        const exists = h.entityType === 'plant' ? db.plants.find(p => p.id === h.entityId) : db.zones.find(z => z.id === h.entityId);
        if (!exists) issues.push({ severity: 'error', message: `En note fra ${h.date || 'ukendt dato'} peger på element der ikke findes`, detail: `Id: ${h.entityId}`, action: null });
    });

    // 4. Stor plante i lille beholder (Træ/Busk i krukke/kasse/højbed)
    db.plants.forEach(p => {
        const z = db.zones.find(z => z.id === p.zoneId);
        if (!z || !p.type) return;
        if (p.type === 'Træ' && ['krukke', 'kasse', 'højbed'].includes(z.type)) {
            issues.push({ severity: 'warning', message: `"${p.name}" er registreret som ${p.type} men er i "${z.name}" (${ZONE_TYPES[z.type]?.label})`, detail: 'Træer er sjældent i krukker — er typen korrekt?', action: `openEditPlant('${p.id}')` });
        }
    });

    // 5. Hæk-plante ikke i hæk-zone
    db.plants.forEach(p => {
        const z = db.zones.find(z => z.id === p.zoneId);
        if (!z || p.type !== 'Hæk' || z.isDirect) return;
        if (z.type !== 'hæk') issues.push({ severity: 'warning', message: `"${p.name}" er type Hæk men er i "${z.name}" (${ZONE_TYPES[z.type]?.label || z.type})`, action: `openEditPlant('${p.id}')` });
    });

    // 6. Plante i træ-zone der ikke er Træ/Busk
    db.plants.forEach(p => {
        const z = db.zones.find(z => z.id === p.zoneId);
        if (!z || z.type !== 'træ' || !p.type) return;
        if (!['Træ', 'Busk'].includes(p.type)) {
            issues.push({ severity: 'warning', message: `"${p.name}" er i en Træ-zone men registreret som "${p.type}"`, action: `openEditPlant('${p.id}')` });
        }
    });

    // 7. Perennial/type-modstrid
    const altidFlerårig = ['Staude', 'Træ', 'Busk', 'Hæk', 'Klatrer', 'Græs'];
    db.plants.forEach(p => {
        if (!p.type || p.perennial === undefined || p.perennial === null) return;
        if (p.perennial === true && p.type === 'Etårig') {
            issues.push({ severity: 'warning', message: `"${p.name}": type er "Etårig" men trivseldata siger "Flerårig"`, detail: 'Tryk Ret for at synkronisere trivseldata med typen', action: `fixPerennialConflict('${p.id}')` });
        }
        if (p.perennial === false && altidFlerårig.includes(p.type)) {
            issues.push({ severity: 'warning', message: `"${p.name}": type er "${p.type}" (flerårig) men trivseldata siger "Etårig"`, detail: 'Tryk Ret for at synkronisere trivseldata med typen', action: `fixPerennialConflict('${p.id}')` });
        }
    });

    // 8. Mangler plantetypen
    db.plants.forEach(p => {
        if (!p.type) issues.push({ severity: 'info', message: `"${p.name}" mangler plantetypen`, action: `openEditPlant('${p.id}')` });
    });

    // 9. Mangler latinsk navn
    db.plants.forEach(p => {
        if (!p.latinName) issues.push({ severity: 'info', message: `"${p.name}" mangler latinsk navn`, action: `openEditPlant('${p.id}')` });
    });

    // 10. Mangler al trivseldata
    db.plants.forEach(p => {
        const hasCare = p.water || p.light || p.drainage || p.perennial !== undefined;
        if (!hasCare) issues.push({ severity: 'info', message: `"${p.name}" mangler trivseldata (vand, lys, jord)`, detail: 'Kan udfyldes via Identificér eller Viden om', action: `closeSheet();goTo('plant','${p.zoneId}','${p.id}')` });
    });

    // 11. Dubletter — samme navn i samme zone
    const seen = new Map();
    db.plants.forEach(p => {
        const key = `${p.zoneId}::${(p.name || '').toLowerCase().trim()}`;
        if (seen.has(key)) {
            issues.push({ severity: 'info', message: `"${p.name}" er registreret to gange i samme zone`, detail: 'Mulig dobbeltregistrering', action: `openEditPlant('${p.id}')` });
        } else { seen.set(key, p); }
    });

    // 12. Tomme zoner (ingen planter, ingen underzoner) — skip isDirect
    db.zones.forEach(z => {
        if (isDirectZone(z.id)) return;
        const harPlanter = db.plants.some(p => p.zoneId === z.id);
        const harSubs    = db.zones.some(s => s.parentZoneId === z.id);
        if (!harPlanter && !harSubs) issues.push({ severity: 'info', message: `Zonen "${z.name}" er tom — ingen planter eller underzoner`, action: `openEditZone('${z.id}')` });
    });

    return issues;
}

function showRegistrationCheck() {
    const issues = runLocalChecks();
    const errors   = issues.filter(i => i.severity === 'error');
    const warnings = issues.filter(i => i.severity === 'warning');
    const infos    = issues.filter(i => i.severity === 'info');

    const renderIssue = issue => {
        const icon = issue.severity === 'error' ? '🔴' : issue.severity === 'warning' ? '⚠️' : 'ℹ️';
        const retBtn = issue.action
            ? `<button onclick="${issue.action}" style="font-size:0.72rem;padding:0.25rem 0.65rem;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--green-dark);cursor:pointer;white-space:nowrap;flex-shrink:0">Ret</button>`
            : '';
        const ignoreBtn = issue.severity === 'info'
            ? `<button onclick="this.closest('div[data-issue]').remove()" style="font-size:0.72rem;padding:0.25rem 0.65rem;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0">Ignorer</button>`
            : '';
        return `<div data-issue style="padding:0.55rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.5rem;align-items:flex-start">
            <span style="font-size:0.88rem;flex-shrink:0;margin-top:0.1rem">${icon}</span>
            <div style="flex:1;min-width:0">
                <div style="font-size:0.82rem;color:var(--text)">${issue.message}</div>
                ${issue.detail ? `<div style="font-size:0.7rem;color:var(--muted);margin-top:0.1rem">${issue.detail}</div>` : ''}
            </div>
            ${retBtn}${ignoreBtn}
        </div>`;
    };

    const renderGroup = (title, items) => {
        if (!items.length) return '';
        return `<div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin:0.9rem 0 0.2rem">${title}</div>
            ${items.map(renderIssue).join('')}`;
    };

    const okColor = issues.length === 0;
    const summaryBg = okColor ? 'var(--green-light)' : errors.length > 0 ? '#fee2e2' : '#fef3c7';
    const summaryColor = okColor ? 'var(--green-dark)' : errors.length > 0 ? '#b91c1c' : '#92400e';
    const summaryIcon  = okColor ? '✅' : errors.length > 0 ? '🔴' : '⚠️';
    const summaryText  = issues.length === 0 ? 'Ingen problemer fundet' : `${issues.length} ${issues.length === 1 ? 'problem' : 'problemer'} fundet`;

    openSheet('🔍 Tjek registreringer', `
        <div style="padding:0 1.2rem 1rem">
            <div style="background:${summaryBg};border-radius:10px;padding:0.75rem 1rem;margin-bottom:0.6rem">
                <div style="font-size:0.92rem;font-weight:700;color:${summaryColor}">${summaryIcon} ${summaryText}</div>
                ${issues.length > 0 ? `<div style="font-size:0.76rem;color:var(--muted);margin-top:0.2rem">🔴 ${errors.length} fejl &nbsp;·&nbsp; ⚠️ ${warnings.length} advarsler &nbsp;·&nbsp; ℹ️ ${infos.length} info</div>` : ''}
            </div>
            ${issues.length === 0 ? '<div style="font-size:0.85rem;color:var(--muted);text-align:center;padding:1.2rem 0">Alt ser korrekt ud 🎉</div>' :
                renderGroup('🔴 Dataintegretiet', errors) +
                renderGroup('⚠️ Type-advarsler', warnings) +
                renderGroup('ℹ️ Manglende data &amp; info', infos)
            }
            <div style="margin-top:1rem">
                <button id="ai-check-btn" onclick="runAICheck()" style="width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:12px;background:var(--white);color:var(--green-dark);font-size:0.85rem;cursor:pointer">
                    🤖 Kør AI-tjek af plantetyper
                </button>
                <div style="font-size:0.7rem;color:var(--muted);text-align:center;margin-top:0.35rem">Claude vurderer om plantetypen matcher navn og latinsk navn · koster øre</div>
            </div>
        </div>`);
}

async function runAICheck() {
    const btn = document.getElementById('ai-check-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Spørger Claude...'; }

    const plantsToCheck = db.plants
        .filter(p => p.name && (p.latinName || p.type))
        .map(p => {
            const z = db.zones.find(z => z.id === p.zoneId);
            return { id: p.id, name: p.name, latinName: p.latinName || '', type: p.type || '', zoneType: z?.type || '' };
        });

    if (!plantsToCheck.length) {
        if (btn) { btn.disabled = false; btn.textContent = '🤖 Kør AI-tjek af plantetyper'; }
        return;
    }

    try {
        const res = await fetch('/.netlify/functions/check-plants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plants: plantsToCheck }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const aiIssues = data.issues || [];

        const ignored = new Set(db.ignoredAIChecks || []);
        const visibleIssues = aiIssues.filter(issue => {
            const p = db.plants.find(x => x.name === issue.name);
            return !p || !ignored.has(p.id);
        });

        const rows = !visibleIssues.length
            ? '<div style="font-size:0.84rem;color:var(--muted);text-align:center;padding:1rem 0">Claude fandt ingen mistænkelige typeregistreringer 🎉</div>'
            : visibleIssues.map(issue => {
                const p = db.plants.find(x => x.name === issue.name);
                const retBtn = (p && issue.suggestedType) ? `<button onclick="applyAISuggestion('${p.id}','${issue.suggestedType}',this)" style="font-size:0.72rem;padding:0.25rem 0.65rem;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--green-dark);cursor:pointer;white-space:nowrap;flex-shrink:0">Ret</button>` : '';
                const ignBtn = p ? `<button onclick="ignoreAICheck('${p.id}',this)" style="font-size:0.72rem;padding:0.25rem 0.65rem;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0">Ignorer</button>` : '';
                const forslag = issue.suggestedType ? ` → foreslår: <strong>${issue.suggestedType}</strong>` : '';
                return `<div style="padding:0.55rem 0;border-bottom:1px solid var(--border);display:flex;gap:0.5rem;align-items:flex-start">
                    <span style="font-size:0.88rem;flex-shrink:0;margin-top:0.1rem">🤖</span>
                    <div style="flex:1;min-width:0">
                        <div style="font-size:0.82rem;color:var(--text)">"${issue.name}": <em>${issue.currentType}</em>${forslag}</div>
                        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.1rem">${issue.reason}</div>
                    </div>
                    ${retBtn}${ignBtn}
                </div>`;
            }).join('');

        const aiSection = document.createElement('div');
        aiSection.style.cssText = 'margin-top:0.9rem';
        aiSection.innerHTML = `<div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.2rem">🤖 AI-tjek — ${aiIssues.length} ${aiIssues.length === 1 ? 'mistænkelig registrering' : 'mistænkelige registreringer'}</div>${rows}`;
        btn?.parentElement?.replaceWith(aiSection);

    } catch (e) {
        if (btn) { btn.disabled = false; btn.textContent = '🤖 Kør AI-tjek (fejl — prøv igen)'; }
        logError('runAICheck: ' + e.message, 'check-plants', 0, e);
    }
}

async function ignoreAICheck(pid, btn) {
    if (!db.ignoredAIChecks) db.ignoredAIChecks = [];
    if (!db.ignoredAIChecks.includes(pid)) db.ignoredAIChecks.push(pid);
    await saveDB();
    btn.closest('div[style]').remove();
}

async function fixPerennialConflict(pid) {
    const p = plant(pid);
    if (!p) return;
    const altidFlerårigTypes = ['Staude', 'Træ', 'Busk', 'Hæk', 'Klatrer', 'Græs'];
    if (p.type === 'Etårig') p.perennial = false;
    else if (altidFlerårigTypes.includes(p.type)) p.perennial = true;
    await saveDB();
    showRegistrationCheck(); // Genindlæs listen
}

async function applyAISuggestion(pid, suggestedType, btn) {
    const p = plant(pid);
    if (!p) return;
    p.type = suggestedType;
    // Synkroniser perennial med den nye type
    const altidFlerårigTypes = ['Staude', 'Træ', 'Busk', 'Hæk', 'Klatrer', 'Græs'];
    const altidEtårigTypes = ['Etårig'];
    if (altidFlerårigTypes.includes(suggestedType)) p.perennial = true;
    else if (altidEtårigTypes.includes(suggestedType)) p.perennial = false;
    await saveDB();
    btn.textContent = '✓';
    btn.disabled = true;
    btn.style.color = 'var(--muted)';
}

            <div style="width:36px;height:36px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--green-dark);font-size:0.9rem;flex-shrink:0">${u.initials || u.name[0]}</div>
            <div style="flex:1">
                <div style="font-weight:600;color:var(--text)">${u.name}${isSelf ? ' <span style="font-size:0.72rem;color:var(--muted)">(dig)</span>' : ''}</div>
                <div style="font-size:0.78rem;color:${ROLE_COLORS[u.role]};font-weight:600">${ROLE_LABELS[u.role]}</div>
            </div>
            <button onclick="renderUserManagement('${u.id}')" style="background:none;border:1px solid var(--border);border-radius:8px;padding:0.3rem 0.7rem;font-size:0.82rem;cursor:pointer;color:var(--text)">Rediger</button>
        </div>`;
    }).join('');

    if (editId) {
        const u = users.find(x => x.id === editId);
        if (!u) { renderUserManagement(); return; }
        const isSelf = u.name === currentUser();
        const isLastAdmin = u.role === 'admin' && adminCount === 1;
        const canDelete = !isSelf && !isLastAdmin;
        openSheet('Rediger bruger', `
            <div style="padding:0 1.2rem 1.5rem;display:flex;flex-direction:column;gap:1rem">
                <div class="field"><label>Navn</label><input id="um-name" value="${u.name.replace(/"/g,'&quot;')}" placeholder="Navn"></div>
                <div class="field"><label>Initialer (maks 2 tegn)</label><input id="um-initials" value="${u.initials || ''}" maxlength="2" placeholder="F.eks. S" style="width:60px"></div>
                <div class="field"><label>Rolle</label>
                    <select id="um-role" ${isSelf && isLastAdmin ? 'disabled title="Du kan ikke fjerne din egen admin-rolle"' : ''}>
                        <option value="admin"${u.role==='admin'?' selected':''}>Admin</option>
                        <option value="member"${u.role==='member'?' selected':''}>Medlem</option>
                        <option value="guest"${u.role==='guest'?' selected':''}>Gæst</option>
                    </select>
                </div>
                <div class="field"><label>Skift PIN</label>
                    <button onclick="closeSheet();startChangePinFor('${u.name}')" style="background:none;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.8rem;font-size:0.85rem;cursor:pointer;color:var(--text);width:fit-content">🔑 Sæt ny PIN</button>
                </div>
                <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.5rem">
                    <button class="btn-primary" onclick="saveUserEdit('${u.id}')">Gem ændringer</button>
                    <button onclick="renderUserManagement()" style="background:none;border:1px solid var(--border);border-radius:10px;padding:0.7rem;font-size:0.9rem;cursor:pointer;color:var(--muted)">Annuller</button>
                    ${canDelete ? `<button class="btn-danger" onclick="confirmDeleteUser('${u.id}','${u.name}')">Slet bruger</button>` : `<div style="font-size:0.78rem;color:var(--muted);text-align:center;padding:0.3rem 0">${isSelf ? 'Du kan ikke slette dig selv' : 'Der skal altid være én admin'}</div>`}
                </div>
            </div>`);
        return;
    }

    if (createMode) {
        openSheet('Tilføj bruger', `
            <div style="padding:0 1.2rem 1.5rem;display:flex;flex-direction:column;gap:1rem">
                <div class="field"><label>Navn</label><input id="um-name" placeholder="Navn" autofocus></div>
                <div class="field"><label>Initialer (maks 2 tegn)</label><input id="um-initials" maxlength="2" placeholder="F.eks. L" style="width:60px"></div>
                <div class="field"><label>Rolle</label>
                    <select id="um-role">
                        <option value="admin">Admin</option>
                        <option value="member" selected>Medlem</option>
                        <option value="guest">Gæst</option>
                    </select>
                </div>
                <div class="field"><label>PIN (4-6 cifre)</label><input id="um-pin" type="tel" inputmode="numeric" maxlength="6" placeholder="F.eks. 1234"></div>
                <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.5rem">
                    <button class="btn-primary" onclick="saveNewUser()">Opret bruger</button>
                    <button onclick="renderUserManagement()" style="background:none;border:1px solid var(--border);border-radius:10px;padding:0.7rem;font-size:0.9rem;cursor:pointer;color:var(--muted)">Annuller</button>
                </div>
            </div>`);
        return;
    }

    openSheet('Brugere', `
        <div style="padding:0 1.2rem 1.5rem">
            ${listHTML}
            <div style="margin-top:1rem">
                <button onclick="renderUserManagement(null, true)" ${canCreate ? '' : 'disabled title="Maks 5 brugere"'}
                    style="width:100%;padding:0.75rem;border:2px dashed var(--border);border-radius:10px;background:none;cursor:${canCreate?'pointer':'not-allowed'};color:${canCreate?'var(--green-mid)':'var(--muted)'};font-size:0.9rem">
                    + Tilføj bruger${canCreate ? '' : ' (maks 5 nået)'}
                </button>
            </div>
        </div>`);
}

function saveUserEdit(id) {
    const u = users.find(x => x.id === id);
    if (!u) return;
    const name = document.getElementById('um-name')?.value.trim();
    const initials = document.getElementById('um-initials')?.value.trim();
    const role = document.getElementById('um-role')?.value;
    if (!name) { alert('Navn må ikke være tomt'); return; }
    if (users.some(x => x.id !== id && x.name === name)) { alert('Brugernavnet er allerede i brug'); return; }
    const isSelf = u.name === currentUser();
    const wasAdmin = u.role === 'admin';
    const adminCount = users.filter(x => x.role === 'admin').length;
    if (isSelf && wasAdmin && role !== 'admin' && adminCount === 1) { alert('Der skal altid være mindst én admin'); return; }
    // Opdater sessionStorage hvis man ændrer sit eget navn
    if (isSelf && name !== u.name) { sessionStorage.setItem('voreshave-user', name); }
    u.name = name;
    u.initials = initials || name[0];
    u.role = role;
    saveUsers();
    renderUserManagement();
}

function saveNewUser() {
    const name = document.getElementById('um-name')?.value.trim();
    const initials = document.getElementById('um-initials')?.value.trim();
    const role = document.getElementById('um-role')?.value;
    const pin = document.getElementById('um-pin')?.value.trim();
    if (!name) { alert('Navn må ikke være tomt'); return; }
    if (users.some(x => x.name === name)) { alert('Brugernavnet er allerede i brug'); return; }
    if (pin && (!/^\d{4,6}$/.test(pin))) { alert('PIN skal være 4-6 cifre'); return; }
    if (users.length >= 5) { alert('Maks 5 brugere'); return; }
    users.push({ id: uuid(), name, pin: pin || '', role, initials: initials || name[0] });
    saveUsers();
    renderUserManagement();
}

function confirmDeleteUser(id, name) {
    if (!confirm(`Slet brugeren "${name}"? Dette kan ikke fortrydes.`)) return;
    users = users.filter(u => u.id !== id);
    saveUsers();
    renderUserManagement();
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── BOOT ──
fsAuth.signInAnonymously().catch(e => {
    logError('Anonymous auth fejlede: ' + e.message, 'boot', '', e);
}).finally(() => {
    loadPhotoCache().then(() => Promise.all([loadDB(), loadUsers(), loadSettings()])).then(() => {
        if (checkAccess()) render();
        fetchWeatherIfNeeded();
    });
});

// ── SWIPE-NAVIGATION (én gang, aldrig genregistreret) ──
(function() {
    let swipeStartX = 0;
    let swipeStartY = 0;
    const appEl = document.getElementById('app');
    appEl.addEventListener('touchstart', e => {
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    appEl.addEventListener('touchend', e => {
        if (nav.view !== 'plant') return;
        const dx = e.changedTouches[0].clientX - swipeStartX;
        const dy = e.changedTouches[0].clientY - swipeStartY;
        if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)) return;
        if (dx > 0) {
            const p = plant(nav.plantId);
            if (p && p.zoneId) {
                const siblings = zonePlants(p.zoneId);
                const idx = siblings.findIndex(pl => pl.id === nav.plantId);
                if (idx > 0) { navToPlantSibling(-1); return; }
            }
            goBack();
        } else {
            navToPlantSibling(1);
        }
    }, { passive: true });
})();
</script>
</body>
