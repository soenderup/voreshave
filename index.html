<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vores Have</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vores Have">
    <meta name="theme-color" content="#2d5a27">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --green-dark: #2d5a27;
            --green-mid: #4a7c3f;
            --green-light: #e8f0e5;
            --terra: #c46b3a;
            --terra-light: #f5e8df;
            --cream: #faf7f2;
            --brown: #6b4e35;
            --text: #2a2a2a;
            --muted: #7a7a7a;
            --border: #ece9e3;
            --white: #ffffff;
        }

        html, body { height: 100%; background: var(--cream); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        body { max-width: 480px; margin: 0 auto; display: grid; grid-template-rows: auto 1fr auto; grid-template-areas: "header" "app" "nav"; }

        /* ── HEADER ── */
        #header {
            grid-area: header;
            background: var(--green-dark);
            padding: 0.9rem 1rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            z-index: 100;
            min-height: 54px;
        }
        #back-btn {
            display: none;
            background: none;
            border: none;
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
            padding: 0.2rem 0.4rem 0.2rem 0;
            cursor: pointer;
            flex-shrink: 0;
        }
        #header-title { flex: 1; color: white; font-size: 1.3rem; font-weight: 700; }
        #header-sub { color: rgba(255,255,255,0.6); font-size: 0.72rem; margin-top: 0.1rem; }
        #add-btn, #edit-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 1.1rem;
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        #add-btn { font-size: 1.3rem; }
        #add-btn:hover, #edit-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── AREA GROUPING ── */
        .area-group { padding: 1rem 1rem 0; }
        .area-header {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.7rem; cursor: pointer; user-select: none;
        }
        .area-icon { font-size: 1.25rem; }
        .area-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brown); flex: 1; }
        .area-count { font-size: 0.8rem; color: var(--muted); }
        .area-chevron { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
        .area-chevron.closed { transform: rotate(-90deg); }
        .area-zones { overflow: hidden; }
        .area-zones.collapsed { display: none; }

        /* ── MAIN ── */
        #app { grid-area: app; overflow-y: auto; padding-bottom: 2rem; }

        /* ── URGENT STRIP ── */
        .urgent-strip { background: var(--terra); padding: 0.6rem 1rem; }
        .attention-strip { background: #c0392b; padding: 0.6rem 1rem; }
        .strip-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .strip-header h2 { color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }
        .strip-chevron { color: rgba(255,255,255,0.6); font-size: 0.75rem; transition: transform 0.2s; }
        .strip-chevron.open { transform: rotate(180deg); }
        .strip-body { margin-top: 0.5rem; }
        .urgent-item {
            display: flex; align-items: flex-start; gap: 0.5rem;
            color: white; font-size: 0.88rem; padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            cursor: pointer;
        }
        .urgent-item:last-child { border-bottom: none; }
        .urgent-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.6); border-radius: 50%; flex-shrink: 0; margin-top: 0.4rem; }
        .urgent-dot.hot { background: #ffe066; }
        .urgent-meta { font-size: 0.72rem; opacity: 0.7; display: block; margin-top: 0.05rem; }

        /* ── SECTION ── */
        .section { padding: 1rem 1rem 0; }
        .section-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.7rem; }
        .section-icon { font-size: 0.95rem; }
        .section-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brown); }

        /* ── ZONE CARD ── */
        .zone-card {
            background: var(--white);
            border-radius: 14px;
            margin-bottom: 0.7rem;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .zone-card:active { opacity: 0.85; }
        .zone-card-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; }
        .zone-card-left { display: flex; align-items: center; gap: 0.6rem; }
        .zone-icon { font-size: 1.1rem; }
        .zone-name { font-size: 0.98rem; font-weight: 600; color: var(--green-dark); }
        .zone-meta { font-size: 0.74rem; color: var(--muted); margin-top: 0.05rem; }
        .zone-badge { font-size: 0.68rem; background: var(--terra-light); color: var(--terra); padding: 0.2rem 0.6rem; border-radius: 999px; font-weight: 600; white-space: nowrap; }
        .zone-badge.ok { background: var(--green-light); color: var(--green-mid); }
        .zone-arrow { color: var(--muted); font-size: 0.9rem; margin-left: 0.3rem; }
        .sub-zone-list { padding: 0.8rem 1rem 0; }
        .sub-zone-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.5rem; padding: 0 1rem; }
        .sub-zone-card { margin-bottom: 0.5rem; }
        .choice-btn { display: flex; align-items: center; gap: 0.9rem; width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.1rem; cursor: pointer; text-align: left; }
        .choice-btn:active { opacity: 0.8; }
        .choice-icon { font-size: 1.5rem; flex-shrink: 0; }
        .choice-label { font-size: 1rem; font-weight: 600; color: var(--green-dark); }
        .choice-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

        /* ── PLANT LIST ── */
        .plant-list { border-top: 1px solid var(--border); }
        .plant-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }
        .plant-row:last-child { border-bottom: none; }
        .plant-row:active { background: var(--cream); }
        .plant-name-wrap .pname { font-size: 0.9rem; font-weight: 500; }
        .plant-name-wrap .platinname { font-size: 0.73rem; color: var(--muted); font-style: italic; }
        .plant-name-wrap .ptype { display: inline-block; font-size: 0.63rem; font-weight: 600; background: var(--green-light); color: var(--green-mid); padding: 0.1rem 0.4rem; border-radius: 4px; margin-top: 0.15rem; }
        .plant-link-btn { font-size: 0.72rem; color: var(--green-mid); text-decoration: none; padding: 0.2rem 0.5rem; background: var(--green-light); border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
        .plant-list-thumb { width: 110px; height: 78px; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(0,0,0,0.08); }
        .plant-photo-btn { width: 52px; height: 52px; border-radius: 8px; background: var(--green-light); border: 1.5px dashed var(--green-mid); color: var(--green-mid); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .zone-photo-delete { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.55); border: none; color: white; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ── ZONE / PLANT DETAIL ── */
        .detail-hero { background: var(--green-light); padding: 1rem; border-bottom: 1px solid var(--border); }
        .detail-hero-name { color: var(--green-dark); font-size: 1.3rem; font-weight: 700; }
        .detail-hero-sub { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
        .detail-hero-photo { width: 100%; height: 140px; object-fit: cover; display: block; border-radius: 10px; margin-top: 0.8rem; }
        .detail-hero-photo-placeholder { width: 100%; height: 90px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-top: 0.8rem; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.78rem; cursor: pointer; border: 1.5px dashed var(--border); }

        /* Tabs */
        .tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 0.7rem; font-size: 0.82rem; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }

        /* Info rows */
        .info-section { padding: 0.9rem 1rem 0; }
        .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { color: var(--muted); }
        .info-row .val { font-weight: 500; text-align: right; max-width: 60%; }
        .info-note { margin: 0.8rem 1rem 0; background: var(--cream); border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.85rem; color: var(--text); line-height: 1.5; }
        .info-note-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); margin-bottom: 0.3rem; }

        /* Reminders */
        .reminder-item {
            display: flex; align-items: flex-start; gap: 0.6rem;
            padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
        }
        .reminder-item:last-child { border-bottom: none; }
        .reminder-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--terra); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 0.05rem; }
        .reminder-check:hover { background: var(--terra-light); }
        .reminder-text { font-size: 0.88rem; font-weight: 500; }
        .reminder-date { font-size: 0.73rem; color: var(--muted); margin-top: 0.1rem; }
        .reminder-repeat { font-size: 0.68rem; color: var(--green-mid); background: var(--green-light); padding: 0.1rem 0.4rem; border-radius: 4px; margin-left: 0.3rem; }

        /* History */
        .history-item { display: flex; gap: 0.8rem; padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); }
        .history-item:last-child { border-bottom: none; }
        .history-date { font-size: 0.72rem; color: var(--muted); white-space: nowrap; padding-top: 0.1rem; min-width: 70px; }
        .history-text { font-size: 0.88rem; line-height: 1.4; }
        .history-tag { display: inline-block; font-size: 0.65rem; background: var(--terra-light); color: var(--terra); border-radius: 4px; padding: 0.05rem 0.35rem; margin-left: 0.3rem; }

        .empty-state { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 0.88rem; }
        .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

        /* ── BOTTOM SHEET ── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; }
        .overlay.visible { display: block; }
        .sheet {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 480px;
            background: var(--white); border-radius: 18px 18px 0 0;
            z-index: 201; padding: 0 0 2rem;
            transition: transform 0.28s ease;
            max-height: 90vh; overflow-y: auto;
        }
        .sheet.open { transform: translateX(-50%) translateY(0); }
        .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0.8rem auto 0.5rem; }
        .sheet-title { font-size: 1rem; font-weight: 700; padding: 0.5rem 1.2rem 1rem; color: var(--text); border-bottom: 1px solid var(--border); }

        /* Form */
        .form-body { padding: 1rem 1.2rem 0; }
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); margin-bottom: 0.35rem; }
        .field input:not([type=checkbox]), .field select, .field textarea {
            width: 100%; padding: 0.65rem 0.8rem;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 0.92rem; font-family: inherit; color: var(--text);
            background: var(--cream);
            -webkit-appearance: none;
        }
        .field input:not([type=checkbox]):focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--green-mid); background: white; }
        .field textarea { min-height: 80px; resize: none; }
        .field-row { display: flex; gap: 0.7rem; }
        .field-row .field { flex: 1; }

        .btn-primary {
            width: calc(100% - 2.4rem); margin: 1rem 1.2rem 0;
            background: var(--green-dark); color: white;
            border: none; border-radius: 12px; padding: 0.85rem;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
        }
        .btn-primary:active { opacity: 0.85; }
        .btn-secondary {
            width: calc(100% - 2.4rem); margin: 0.5rem 1.2rem 0;
            background: none; color: var(--green-dark);
            border: 1.5px solid var(--green-mid); border-radius: 12px; padding: 0.75rem;
            font-size: 0.88rem; cursor: pointer;
        }
        .btn-secondary:active { opacity: 0.8; }
        .status-tag { display: inline-block; font-size: 0.65rem; border-radius: 4px; padding: 0.1rem 0.4rem; margin-top: 0.15rem; font-weight: 600; }
        .status-tag.attention { background: #fdecea; color: #c0392b; }
        .status-tag.overdue   { background: #fdecea; color: #c0392b; }
        .status-tag.upcoming  { background: #fef6e4; color: #b07d00; }
        .attention-badge { margin: 0.5rem 1rem 0; background: #fdecea; color: #c0392b; border-radius: 8px; padding: 0.45rem 0.7rem; font-size: 0.82rem; font-weight: 600; }
        .history-item.has-attention { border-left: 3px solid #c0392b; padding-left: calc(1rem - 3px); }
        .history-tag.attention { background: #fdecea; color: #c0392b; }
        .field-toggle { display: flex; align-items: center; justify-content: space-between; }
        .field-toggle input[type=checkbox] { width: 22px; height: 22px; accent-color: #c0392b; cursor: pointer; }
        .btn-danger {
            width: calc(100% - 2.4rem); margin: 0.5rem 1.2rem 0;
            background: none; color: #c0392b;
            border: 1.5px solid #e8b0ac; border-radius: 12px; padding: 0.75rem;
            font-size: 0.88rem; cursor: pointer;
        }

        .section-add-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            width: 100%; padding: 0.65rem; margin-top: 0.3rem;
            background: none; border: 1.5px dashed var(--border); border-radius: 12px;
            color: var(--muted); font-size: 0.85rem; cursor: pointer;
        }
        .section-add-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }

        /* ── FOTOS ── */
        .photo-strip {
            display: flex; gap: 0.6rem; overflow-x: auto; padding: 0.8rem 1rem;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            background: var(--green-dark);
        }
        .photo-strip::-webkit-scrollbar { display: none; }
        .photo-thumb {
            position: relative; flex-shrink: 0;
            width: 88px; height: 88px; border-radius: 10px; overflow: hidden;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.15);
        }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-delete {
            position: absolute; top: 3px; right: 3px;
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(0,0,0,0.55); border: none; color: white;
            font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .photo-add {
            flex-shrink: 0; width: 88px; height: 88px; border-radius: 10px;
            background: rgba(255,255,255,0.08); border: 1.5px dashed rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.5); font-size: 1.6rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .photo-add:hover { background: rgba(255,255,255,0.14); }

        /* ── LIGHTBOX ── */
        #lightbox {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 100%; max-height: 100vh; object-fit: contain; }
        #lightbox-close {
            position: absolute; top: 1rem; right: 1rem;
            background: rgba(255,255,255,0.15); border: none; color: white;
            font-size: 1.2rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
        }

        /* ── LOCKSCREEN ── */
        #lockscreen {
            position: fixed; inset: 0; z-index: 500;
            background: var(--green-dark);
            flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem 1rem; display: none;
        }
        #lockscreen.visible { display: flex; }
        .ls-logo { font-size: 3.3rem; margin-bottom: 0.3rem; }
        .ls-title { color: white; font-size: 1.95rem; font-weight: 700; margin-bottom: 0.2rem; text-align: center; }
        .ls-subtitle { color: rgba(255,255,255,0.55); font-size: 0.85rem; margin-bottom: 1.8rem; text-align: center; }
        .ls-dots { display: flex; gap: 1.1rem; margin-bottom: 0.7rem; }
        .ls-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.45); transition: background 0.1s; }
        .ls-dot.filled { background: white; border-color: white; }
        .ls-error { color: #ffaaaa; font-size: 0.82rem; min-height: 1.1rem; margin-bottom: 0.8rem; text-align: center; }
        .ls-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 0.75rem; }
        .ls-key {
            width: 72px; height: 72px; border-radius: 50%;
            background: rgba(255,255,255,0.13); border: none; color: white;
            font-size: 1.4rem; font-weight: 400; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .ls-key:active { background: rgba(255,255,255,0.28); }
        .ls-key.empty { background: none; cursor: default; }
        .ls-users { display: flex; flex-direction: column; gap: 0.9rem; width: 100%; max-width: 280px; margin-top: 0.5rem; }
        .ls-user-btn {
            background: rgba(255,255,255,0.14); border: none; border-radius: 14px;
            color: white; font-size: 1.05rem; font-weight: 600; padding: 1rem;
            cursor: pointer; letter-spacing: 0.02em;
        }
        .ls-user-btn:active { background: rgba(255,255,255,0.26); }

        /* ── BRUGER ── */
        #user-btn {
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255,255,255,0.18); border: none; color: white;
            font-size: 0.72rem; font-weight: 700; cursor: pointer;
            display: none; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .user-tag {
            display: inline-block; font-size: 0.65rem; font-weight: 600;
            padding: 0.1rem 0.45rem; border-radius: 4px; margin-left: 0.3rem;
            background: var(--green-light); color: var(--green-mid);
        }
        .user-tag.linda { background: #f0e8f8; color: #7b4fa6; }
        .assignee-chip {
            display: inline-flex; align-items: center; gap: 0.25rem;
            font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.5rem;
            border-radius: 999px; margin-top: 0.2rem;
        }
        .assignee-chip.alle { background: var(--green-light); color: var(--green-mid); }
        .assignee-chip.steen { background: var(--green-light); color: var(--green-mid); }
        .assignee-chip.linda { background: #f0e8f8; color: #7b4fa6; }

        /* ── IDENTIFY VIEW ── */
        .identify-wrap { padding: 1.2rem 1rem 2rem; }
        .identify-upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            background: var(--white);
            min-height: 200px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 0.6rem; cursor: pointer; overflow: hidden;
            transition: border-color 0.2s;
            position: relative;
        }
        .identify-upload-area:active { border-color: var(--green-mid); }
        .identify-upload-area img { width: 100%; height: 220px; object-fit: cover; border-radius: 14px; }
        .identify-upload-icon { font-size: 2.8rem; }
        .identify-upload-label { font-size: 0.9rem; color: var(--muted); text-align: center; line-height: 1.4; }
        .identify-upload-change {
            position: absolute; bottom: 0.6rem; right: 0.6rem;
            background: rgba(0,0,0,0.55); color: white;
            border: none; border-radius: 8px; padding: 0.3rem 0.7rem;
            font-size: 0.75rem; cursor: pointer;
        }
        .identify-result-card {
            background: var(--white); border-radius: 16px;
            border: 1px solid var(--border); overflow: hidden; margin-top: 1.2rem;
        }
        .identify-result-header { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
        .identify-result-name { font-size: 1.15rem; font-weight: 700; color: var(--text); }

const PHOTO_DB_NAME = 'minhave-photos';
const PHOTO_STORE = 'photos';
let photoCache = new Map();

function openPhotoDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(PHOTO_DB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(PHOTO_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function loadPhotoCache() {
    try {
        const idb = await openPhotoDB();
        await new Promise((resolve, reject) => {
            const tx = idb.transaction(PHOTO_STORE, 'readonly');
            const cursor = tx.objectStore(PHOTO_STORE).openCursor();
            cursor.onsuccess = e => {
                const c = e.target.result;
                if (c) { photoCache.set(c.key, c.value); c.continue(); }
                else resolve();
            };
            cursor.onerror = () => reject(cursor.error);
        });
    } catch (e) { console.warn('IndexedDB cache load fejlede:', e); }
}

async function savePhotoToIDB(key, base64) {
    photoCache.set(key, base64);
    try {
        const idb = await openPhotoDB();
        await new Promise((resolve, reject) => {
            const tx = idb.transaction(PHOTO_STORE, 'readwrite');
            tx.objectStore(PHOTO_STORE).put(base64, key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    } catch (e) { console.warn('IndexedDB save fejlede:', e); }
}

async function deletePhotoFromIDB(key) {
    photoCache.delete(key);
    try {
        const idb = await openPhotoDB();
        await new Promise((resolve, reject) => {
            const tx = idb.transaction(PHOTO_STORE, 'readwrite');
            tx.objectStore(PHOTO_STORE).delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    } catch (e) { console.warn('IndexedDB delete fejlede:', e); }
}

    (db.plants || []).forEach(p => {

async function loadDB() {
    const localRaw = localStorage.getItem('minhave-v3');
    try {
        const snap = await DATA_REF.get();
        if (snap.exists) {
            db = snap.data();
        } else {
            seedDB();
            await DATA_REF.set(db);
        }
        mergeLocalPhotos();
        localStorage.setItem('minhave-v3', JSON.stringify(db));
    } catch (e) {
        if (localRaw) db = JSON.parse(localRaw);
        else seedDB();
        mergeLocalPhotos();
    }
    DATA_REF.onSnapshot({ includeMetadataChanges: true }, snap => {
        if (snap.exists && !snap.metadata.hasPendingWrites) {
            db = snap.data();
            mergeLocalPhotos();
            localStorage.setItem('minhave-v3', JSON.stringify(db));
            if (sessionStorage.getItem('minhave-unlocked') === '1') render();
        }
    });
}

function plant(id) { return db.plants.find(p => p.id === id); }
function zonePlants(zid) { return db.plants.filter(p => p.zoneId === zid); }
function subZones(zid) { return db.zones.filter(z => z.parentZoneId === zid); }
function entityReminders(type, id) { return db.reminders.filter(r => r.entityType === type && r.entityId === id); }
function entityHistory(type, id) { return db.history.filter(h => h.entityType === type && h.entityId === id).sort((a,b) => b.date.localeCompare(a.date)); }

function plantAttentionFlag(pid) {
    return db.history.some(h => h.entityType === 'plant' && h.entityId === pid && h.needsAttention);
}
function plantReminderStatus(pid) {
    const todayStr = new Date().toISOString().slice(0,10);
    const in7 = new Date(); in7.setDate(in7.getDate() + 7);
    const in7Str = in7.toISOString().slice(0,10);
    const reminders = entityReminders('plant', pid);
    let overdue = false, upcoming = false;
    for (const r of reminders) {
        if (r.date < todayStr) overdue = true;
        else if (r.date <= in7Str) upcoming = true;
    }
    return overdue ? 'overdue' : upcoming ? 'upcoming' : null;
}

function urgentReminders() {
    const today = new Date();
    const limit = new Date(); limit.setDate(limit.getDate() + 7);
    return db.reminders
        .filter(r => { const d = new Date(r.date); return d <= limit; })
        .sort((a,b) => a.date.localeCompare(b.date));
}

function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
}

function daysUntil(iso) {
    const diff = Math.ceil((new Date(iso) - new Date()) / 86400000);
    if (diff < 0) return 'Overskredet';
    if (diff === 0) return 'I dag';
    if (diff === 1) return 'I morgen';
    return `Om ${diff} dage`;
}

function zoneStatus(zid) {
    const urgent = db.reminders.filter(r => {
        if (r.entityType === 'zone' && r.entityId === zid) return new Date(r.date) <= new Date();
        if (r.entityType === 'plant') {
            const p = plant(r.entityId);
            return p && p.zoneId === zid && new Date(r.date) <= new Date();
        }
        return false;
    });
    return urgent.length > 0 ? 'urgent' : 'ok';
}

// ── NAVIGATION ──
function goTo(view, zoneId = null, plantId = null, tab = 'main') {
    nav = { ...nav, view, zoneId, plantId, tab };
    render();
    if (view === 'plant' && plantId) {
        const p = plant(plantId);
        if (p && p.latinName && !p.aiInfo) fetchPlantInfo(plantId);
    }
}
function goBack() {
    if (nav.view === 'plant') goTo('zone', nav.zoneId);
    else if (nav.view === 'zone') {
        const z = zone(nav.zoneId);
        if (z?.parentZoneId) goTo('zone', z.parentZoneId);
        else goTo('home');
    } else goTo('home');
}

// ── RENDER ──
function render() {
    const app = document.getElementById('app');
    const backBtn = document.getElementById('back-btn');
    const addBtn = document.getElementById('add-btn');
    const title = document.getElementById('header-title');
    const sub = document.getElementById('header-sub');

    const editBtn = document.getElementById('edit-btn');
    const isTop = nav.view === 'home' || nav.view === 'calendar' || nav.view === 'identify';
    backBtn.style.display = isTop ? 'none' : 'block';
    editBtn.style.display = (nav.view === 'zone' || nav.view === 'plant') && canEdit() ? 'flex' : 'none';
    const showAdd = nav.view !== 'calendar' && nav.view !== 'identify' &&
        (canEdit() || (canLog() && nav.view === 'plant'));
    addBtn.style.display = showAdd ? 'flex' : 'none';

    // Bottom nav active state
    document.getElementById('nav-home').classList.toggle('active', nav.view !== 'calendar' && nav.view !== 'identify');
    document.getElementById('nav-identify').classList.toggle('active', nav.view === 'identify');
    document.getElementById('nav-calendar').classList.toggle('active', nav.view === 'calendar');

    // Bruger-knap
    const userBtn = document.getElementById('user-btn');
    const user = currentUser();
    userBtn.textContent = user ? user[0].toUpperCase() : '?';
    userBtn.style.display = 'flex';
    userBtn.style.background = user === 'Linda' ? 'rgba(123,79,166,0.4)' : 'rgba(255,255,255,0.18)';

    // Header viser altid det samme
    title.innerHTML = '🌿 Vores Have';
    sub.textContent = new Date().toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });

    if (nav.view === 'home') {
        app.innerHTML = renderHome();
    } else if (nav.view === 'calendar') {
        app.innerHTML = renderCalendar();
    } else if (nav.view === 'identify') {
        app.innerHTML = renderIdentify();
    } else if (nav.view === 'zone') {
        addBtn.style.display = 'flex';
        app.innerHTML = renderZone(nav.zoneId);
    } else if (nav.view === 'plant') {
        addBtn.style.display = 'flex';
        app.innerHTML = renderPlant(nav.plantId);
    }

    bindEvents();
}

function renderHome() {
    const attentionPlants = db.history
        .filter(h => h.entityType === 'plant' && h.needsAttention)
        .map(h => db.plants.find(p => p.id === h.entityId))
        .filter(Boolean);
    const attentionHTML = attentionPlants.length === 0 ? '' : `
        <div class="attention-strip">
            <div class="strip-header" onclick="attentionOpen=!attentionOpen;render()">
                <h2>Kræver opmærksomhed (${attentionPlants.length})</h2>
                <span class="strip-chevron${attentionOpen ? ' open' : ''}">▾</span>
            </div>
            ${attentionOpen ? `<div class="strip-body">${attentionPlants.map(p => {
                const z = zone(p.zoneId);
                return `<div class="urgent-item" onclick="goTo('plant','${p.zoneId}','${p.id}','history')">
                    <div class="urgent-dot hot"></div>
                    <div>${p.name}<span class="urgent-meta">${z ? z.name : ''}</span></div>
                </div>`;
            }).join('')}</div>` : ''}
        </div>`;

    const urgent = urgentReminders();
    const urgentHTML = urgent.length === 0 ? '' : `
        <div class="urgent-strip">
            <div class="strip-header" onclick="urgentOpen=!urgentOpen;render()">
                <h2>Påmindelser (${urgent.length})</h2>
                <span class="strip-chevron${urgentOpen ? ' open' : ''}">▾</span>
            </div>
            ${urgentOpen ? `<div class="strip-body">${urgent.map(r => {
                const days = daysUntil(r.date);
                const hot = new Date(r.date) <= new Date();
                let who = '';
                if (r.entityType === 'plant') { const p = plant(r.entityId); who = p ? p.name + ' · ' : ''; }
                else { const z = zone(r.entityId); who = z ? z.name + ' · ' : ''; }
                const navTarget = r.entityType === 'plant'
                    ? `goTo('plant','${r.entityId ? plant(r.entityId)?.zoneId : ''}','${r.entityId}','reminders')`
                    : `goTo('zone','${r.entityId}',null,'reminders')`;
                return `<div class="urgent-item" onclick="${navTarget}">
                    <div class="urgent-dot${hot ? ' hot' : ''}"></div>
                    <div>${r.text}<span class="urgent-meta">${who}${days}</span></div>
                </div>`;
            }).join('')}</div>` : ''}
        </div>`;

    function zoneCard(z) {
        const plants = zonePlants(z.id);
        const subs = subZones(z.id);
        const status = zoneStatus(z.id);
        const icon = ZONE_TYPES[z.type]?.icon || '🏡';
        const badge = status === 'urgent'
            ? `<span class="zone-badge">Handling krævet</span>`
            : `<span class="zone-badge ok">OK</span>`;
        const parts = [];
        if (z.description) parts.push(z.description);
        if (subs.length > 0) parts.push(`${subs.length} zone${subs.length !== 1 ? 'r' : ''}`);
        parts.push(`${plants.length} element${plants.length !== 1 ? 'er' : ''}`);
        const meta = parts.join(' · ');
        return `<div class="zone-card" data-zone="${z.id}">
            <div class="zone-card-header">
                <div class="zone-card-left">
                    <span class="zone-icon">${icon}</span>
                    <div>
                        <div class="zone-name">${z.name}</div>
                        <div class="zone-meta">${meta}</div>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:0.4rem">${badge}<span class="zone-arrow">›</span></div>
            </div>
        </div>`;
    }

    const areasHTML = Object.entries(AREAS).map(([areaKey, area]) => {
        const zones = db.zones.filter(z => (z.area || 'baghave') === areaKey && !z.parentZoneId);
        if (zones.length === 0) return '';
        const collapsed = collapsedAreas.has(areaKey);
        const urgentInArea = zones.some(z => zoneStatus(z.id) === 'urgent');
        return `<div class="area-group">
            <div class="area-header" onclick="toggleArea('${areaKey}')">
                <span class="area-icon">${area.icon}</span>
                <span class="area-title">${area.label}</span>
                <span class="area-count">${zones.length} zone${zones.length !== 1 ? 'r' : ''}${urgentInArea ? ' · ⚠️' : ''}</span>
                <span class="area-chevron${collapsed ? ' closed' : ''}">▾</span>
            </div>
            ${collapsed ? '' : `<div class="area-zones">${zones.map(zoneCard).join('')}</div>`}
            ${!collapsed && canEdit() ? `<div style="padding:0.2rem 1rem 0.6rem;display:flex;gap:0.5rem">
                <button class="section-add-btn" onclick="openAddDirectPlant('${areaKey}');event.stopPropagation()">+ Tilføj element</button>
            </div>` : ''}
        </div>`;
    }).join('');

    return `
        ${attentionHTML}
        ${urgentHTML}
        ${areasHTML}
        ${canEdit() ? `<div style="padding:0 1rem 0.5rem;display:flex;gap:0.5rem;flex-wrap:wrap">
            <button class="section-add-btn" onclick="openAddZone()">+ Tilføj ny zone</button>
        </div>` : ''}`;
}

function bindEvents() {
    document.querySelectorAll('[data-zone]').forEach(el =>
        el.addEventListener('click', () => goTo('zone', el.dataset.zone)));
    document.querySelectorAll('[data-plant]').forEach(el =>
        el.addEventListener('click', () => goTo('plant', nav.zoneId, el.dataset.plant)));
    document.querySelectorAll('[data-complete]').forEach(el =>
        el.addEventListener('click', () => completeReminder(el.dataset.complete)));
}

function setTab(t) {
    nav.tab = t;
    render();
}

// ── FOTOS ──
function compressImage(file, maxPx, quality) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const ratio = Math.min(maxPx / img.width, maxPx / img.height, 1);
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * ratio);
                canvas.height = Math.round(img.height * ratio);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

function base64ToBlob(base64) {
    const [meta, data] = base64.split(',');
    const mime = meta.match(/:(.*?);/)[1];
    const bytes = atob(data);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mime });
}

async function uploadPhoto(file) {
    const base64 = await compressImage(file, 1200, 0.78);
    const blob = base64ToBlob(base64);
    const ref = fsStorage.ref(`photos/${uuid()}.jpg`);
    await ref.put(blob);
    return await ref.getDownloadURL();
}

async function deleteStoragePhoto(url) {
    if (url && url.startsWith('https://')) {
        try { await fsStorage.refFromURL(url).delete(); } catch {}
    }
}

function calEventSource() {
    const upcoming = db.reminders.map(r => ({
        date: r.date, text: r.text, entityType: r.entityType, entityId: r.entityId, kind: 'upcoming', rid: r.id
    }));
    const hist = db.history.map(h => ({
        date: h.date, text: h.text, entityType: h.entityType, entityId: h.entityId, kind: 'history', hid: h.id
    }));
    return [...upcoming, ...hist];
}

function entityName(type, id) {
    if (type === 'zone') { const z = zone(id); return z ? z.name : ''; }
    if (type === 'plant') { const p = plant(id); return p ? p.name : ''; }
    return '';
}

const MONTH_NAMES = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];

async function openPlantSuggestions(pid) {
    const p = plant(pid);
    if (!p) return;

    openSheet(`💡 Anbefalinger til ${p.name}`, `
        <div id="suggestions-body" style="padding:0.5rem 0">
            <div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:0.88rem">Henter anbefalinger...</div>
        </div>
        <button class="btn-secondary" onclick="openPlantSuggestions('${pid}')">↺ Søg igen</button>`);

    try {
        const res = await fetch('/.netlify/functions/recommendations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plant: { id: p.id, name: p.name, latinName: p.latinName, type: p.type } }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = data.items || [];

        const body = document.getElementById('suggestions-body');
        if (!body) return;

        if (!items.length) {
            body.innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:0.88rem">Ingen anbefalinger fundet – prøv igen.</div>`;
            return;
        }

        body.innerHTML = items.map((item, i) => {
            const monthNames = (item.months || []).map(m => MONTH_NAMES[m - 1]).join(', ');
            const now = new Date().getMonth() + 1;
            const sorted = [...(item.months || [])].sort((a, b) => ((a - now + 12) % 12) - ((b - now + 12) % 12));
            const m = sorted[0] || (new Date().getMonth() + 1);
            const year = now > m ? new Date().getFullYear() + 1 : new Date().getFullYear();
            const date = `${year}-${String(m).padStart(2, '0')}-01`;
            const safeText = item.text.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
            return `<div id="sugg-${i}" style="padding:0.9rem 1rem;border-bottom:1px solid var(--border)">
                <div style="font-size:0.9rem;line-height:1.45;color:var(--text);margin-bottom:0.4rem">${item.text}</div>
                <div style="font-size:0.72rem;color:var(--muted);margin-bottom:0.6rem">📅 ${monthNames}</div>
                <button onclick="addSuggestionAsReminder('plant','${p.id}','${date}','${safeText}','sugg-${i}')"
                    style="background:var(--green-dark);color:white;border:none;border-radius:8px;padding:0.35rem 0.8rem;font-size:0.8rem;cursor:pointer">
                    + Tilføj til kalender
                </button>
            </div>`;
        }).join('');
    } catch (e) {
        const body = document.getElementById('suggestions-body');
        if (body) body.innerHTML = `<div style="padding:1rem;color:#c0392b;font-size:0.85rem">Kunne ikke hente anbefalinger – prøv igen.</div>`;
    }
}

                    <div style="font-size:1.5rem;margin-bottom:0.5rem">🤷</div>

function previewIdentifyImage(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        resizeImageForAPI(e.target.result, 800).then(resized => {
            identifyState.imageDataUrl = resized;
            identifyState.result = null;
            const app = document.getElementById('app');
            app.innerHTML = renderIdentify();
        });
    };
    reader.readAsDataURL(file);
}

function resizeImageForAPI(dataUrl, maxPx) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxPx || h > maxPx) {
                if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
                else       { w = Math.round(w * maxPx / h); h = maxPx; }
            }
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', 0.85));
        };
        img.src = dataUrl;
    });
}

function renderCalendar() {
    const year = nav.calYear, month = nav.calMonth;
    const monthName = new Date(year, month, 1).toLocaleDateString('da-DK', { month: 'long', year: 'numeric' });
    const firstDay = new Date(year, month, 1).getDay(); // 0=sun
    const startOffset = (firstDay === 0 ? 6 : firstDay - 1); // mon-based
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayStr = new Date().toISOString().slice(0,10);
    const selStr = nav.calSelected;

    const events = calEventSource();
    // Build set of dates with events this month
    const dotsByDate = {};
    events.forEach(e => {
        if (!e.date) return;
        const d = new Date(e.date);
        if (d.getFullYear() === year && d.getMonth() === month) {
            const key = e.date;
            if (!dotsByDate[key]) dotsByDate[key] = { upcoming: 0, history: 0 };
            dotsByDate[key][e.kind]++;
        }
    });

    // Grid cells
    let cells = '';
    for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day empty"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dots = dotsByDate[iso] || {};
        const isToday = iso === todayStr;
        const isSel = iso === selStr;
        let cls = 'cal-day';
        if (isToday) cls += ' today';
        if (isSel && !isToday) cls += ' selected';
        const dotsHTML = [
            ...(Array(Math.min(dots.upcoming||0, 3)).fill('<span class="cal-dot upcoming"></span>')),
            ...(Array(Math.min(dots.history||0, 3)).fill('<span class="cal-dot history"></span>'))
        ].join('');
        cells += `<div class="${cls}" onclick="calSelectDay('${iso}')">
            <span class="cal-day-num">${d}</span>
            ${dotsHTML ? `<div class="cal-dots">${dotsHTML}</div>` : ''}
        </div>`;
    }

    // Events list
    let listHTML = '';
    const filterDate = selStr && new Date(selStr).getFullYear() === year && new Date(selStr).getMonth() === month ? selStr : null;

    // Upcoming
    let upcomingEvents = events.filter(e => e.kind === 'upcoming');
    if (filterDate) upcomingEvents = upcomingEvents.filter(e => e.date === filterDate);
    upcomingEvents.sort((a,b) => a.date.localeCompare(b.date));

    // History
    let histEvents = events.filter(e => e.kind === 'history');
    if (filterDate) histEvents = histEvents.filter(e => e.date === filterDate);
    histEvents.sort((a,b) => b.date.localeCompare(a.date));

    function eventCard(e) {
        const d = new Date(e.date);
        const day = d.getDate();
        const mon = d.toLocaleDateString('da-DK', { month: 'short' });
        const who = entityName(e.entityType, e.entityId);
        const isPast = e.date < todayStr;
        const tag = e.kind === 'history'
            ? `<span class="cal-event-tag history">Udført</span>`
            : isPast
                ? `<span class="cal-event-tag overdue">Overskredet</span>`
                : `<span class="cal-event-tag upcoming">Kommende</span>`;
        const clickAttr = canEdit() && e.kind === 'upcoming' && e.rid
            ? `onclick="openEditReminder('${e.rid}')" style="cursor:pointer"`
            : canEdit() && e.kind === 'history' && e.hid
            ? `onclick="openEditHistoryItem('${e.hid}')" style="cursor:pointer"`
            : '';
        const deleteBtn = canEdit() && e.kind === 'history' && e.hid
            ? `<button onclick="doDeleteHistory('${e.hid}');event.stopPropagation()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0;flex-shrink:0" title="Slet">×</button>`
            : canEdit() && e.kind === 'upcoming' && e.rid
            ? `<button onclick="if(confirm('Slet påmindelse?')){db.reminders=db.reminders.filter(r=>r.id!=='${e.rid}');saveDB();render();}event.stopPropagation()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0;flex-shrink:0" title="Slet">×</button>`
            : '';
        return `<div class="cal-event" ${clickAttr} style="display:flex;align-items:flex-start;gap:0.5rem">
            <div class="cal-event-date">
                <div class="cal-event-day">${day}</div>
                <div class="cal-event-month">${mon}</div>
            </div>
            <div class="cal-event-body" style="flex:1">
                <div class="cal-event-text">${e.text}${tag}</div>
                ${who ? `<div class="cal-event-who">${who}</div>` : ''}
            </div>
            ${deleteBtn}
        </div>`;
    }

    const upcomingSection = upcomingEvents.length === 0 ? '' : `
        <div class="cal-section">
            <div class="cal-section-title">Kommende${filterDate ? ' — ' + formatDate(filterDate) : ''}</div>
            ${upcomingEvents.map(eventCard).join('')}
        </div>`;

    const histSection = histEvents.length === 0 ? '' : `
        <div class="cal-section">
            <div class="cal-section-title">Historik${filterDate ? ' — ' + formatDate(filterDate) : ''}</div>
            ${histEvents.map(eventCard).join('')}
        </div>`;

    const emptyMsg = (!upcomingSection && !histSection)
        ? `<div class="empty-state"><span class="empty-icon">📅</span>${filterDate ? 'Ingen aktiviteter denne dag' : 'Ingen aktiviteter denne måned'}</div>` : '';

    return `
        <div class="cal-month-nav">
            <button class="cal-month-btn" onclick="calPrev()">‹</button>
            <span class="cal-month-label">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}</span>
            <button class="cal-month-btn" onclick="calNext()">›</button>
        </div>
        <div class="cal-grid">
            <div class="cal-weekdays">
                ${['Ma','Ti','On','To','Fr','Lø','Sø'].map(d => `<div class="cal-wd">${d}</div>`).join('')}
            </div>
            <div class="cal-days">${cells}</div>
        </div>
        <div style="padding:0.4rem 1rem;display:flex;gap:0.8rem;align-items:center;border-bottom:1px solid var(--border);background:var(--white)">
            <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.72rem;color:var(--muted)"><span class="cal-dot upcoming" style="width:7px;height:7px;display:inline-block"></span>Kommende</span>
            <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.72rem;color:var(--muted)"><span class="cal-dot history" style="width:7px;height:7px;display:inline-block"></span>Udført</span>
            ${filterDate ? `<button onclick="calSelectDay(null)" style="margin-left:auto;font-size:0.72rem;background:none;border:none;color:var(--terra);cursor:pointer">Vis alle ×</button>` : ''}
        </div>
        ${upcomingSection}
        ${histSection}
        ${emptyMsg}
        <div style="height:1rem"></div>`;
}

function calSelectDay(iso) {
    nav.calSelected = nav.calSelected === iso ? null : iso;
    render();
}

function calPrev() {
    if (nav.calMonth === 0) { nav.calMonth = 11; nav.calYear--; }
    else nav.calMonth--;
    nav.calSelected = null;
    render();
}

function calNext() {
    if (nav.calMonth === 11) { nav.calMonth = 0; nav.calYear++; }
    else nav.calMonth++;
    nav.calSelected = null;
    render();
}

function toggleArea(areaKey) {
    if (collapsedAreas.has(areaKey)) {
        // Åbn denne, luk alle andre
        collapsedAreas = new Set(Object.keys(AREAS));
        collapsedAreas.delete(areaKey);
    } else {
        // Luk denne
        collapsedAreas.add(areaKey);
    }
    render();
}

// ── COMPLETE REMINDER ──
function completeReminder(rid) {
    const r = db.reminders.find(x => x.id === rid);
    if (!r) return;
    const today = new Date().toISOString().slice(0,10);
    r.completedDates.push(today);
    // Add to history
    db.history.push({ id: uuid(), entityType: r.entityType, entityId: r.entityId, date: today, text: r.text, fromReminder: true, createdBy: currentUser() });
    if (r.repeat === 'none') {
        db.reminders = db.reminders.filter(x => x.id !== rid);
    } else if (r.repeat === 'yearly') {
        const d = new Date(r.date); d.setFullYear(d.getFullYear() + 1);
        r.date = d.toISOString().slice(0,10);
    } else if (r.repeat === 'monthly') {
        const d = new Date(r.date); d.setMonth(d.getMonth() + 1);
        r.date = d.toISOString().slice(0,10);
    }
    saveDB();
    render();
}

async function fetchPlantInfo(pid) {
    const p = plant(pid);
    if (!p) return;
    const setStatus = (msg) => {
        const el = document.getElementById('ai-status');
        if (el) el.textContent = msg;
    };
    const showRetry = () => {
        const btn = document.getElementById('ai-retry');
        if (btn) btn.style.display = 'block';
    };
    try {
        setStatus('Henter planteinfo...');
        const res = await fetch('/.netlify/functions/plant-info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: p.name, latinName: p.latinName, plantType: p.type, note: p.note }),
        });
        if (!res.ok) {
            setStatus(`Fejl ${res.status} – funktionen svarede ikke korrekt.`);
            showRetry();
            return;
        }
        const data = await res.json();
        const fresh = plant(pid);
        if (fresh && data.info) {
            fresh.aiInfo = data.info;
            saveDB();
        }
    } catch (e) {
        setStatus('Netværksfejl – er du online?');
        showRetry();
        console.warn('fetchPlantInfo fejlede:', e);
    }
}

function refreshPlantInfo(pid) {

// ── PIN & BRUGER ──
let pinBuffer = '';
let pinTemp = '';
let pinMode = '';
let setupName = '';

function currentUser() { return sessionStorage.getItem('minhave-user') || ''; }
function isGuest() { return currentUser() === 'Gæst'; }
function canEdit() { return currentUser() === 'Steen'; }
function canLog()  { return currentUser() === 'Steen' || currentUser() === 'Linda'; }

function checkAccess() {
    if (sessionStorage.getItem('minhave-unlocked') === '1') return true;
    const hasPins = pins.Steen || pins.Linda;
    showLockscreen(hasPins ? 'enter' : 'nameselect');
    return false;
}

function showLockscreen(mode) {
    pinMode = mode;
    pinBuffer = '';
    document.getElementById('lockscreen').classList.add('visible');
    updateDots();
    document.getElementById('ls-error').textContent = '';

    const subtitles = {
        nameselect: 'Hvem er du?',
        setup:      `Vælg PIN for ${setupName}`,
        setup2:     'Gentag koden for at bekræfte',
        enter:      'Indtast din PIN',
    };
    document.getElementById('ls-subtitle').textContent = subtitles[mode] || '';

    const showDots = mode !== 'nameselect';
    document.querySelector('.ls-dots').style.display = showDots ? 'flex' : 'none';
    document.querySelector('.ls-error').style.display = showDots ? 'block' : 'none';

    const content = document.getElementById('ls-content');
    if (mode === 'nameselect') {
        content.innerHTML = `<div class="ls-users">
            <button class="ls-user-btn" onclick="selectSetupName('Steen')">Steen</button>
            <button class="ls-user-btn" onclick="selectSetupName('Linda')">Linda</button>
        </div>`;
    } else {
        content.innerHTML = `<div class="ls-pad">
            ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k =>
                k === '' ? '<div class="ls-key empty"></div>'
                         : `<button class="ls-key" onclick="pinKey('${k}')">${k}</button>`
            ).join('')}
        </div>`;
    }
}

function updateDots() {
    for (let i = 0; i < 6; i++) {
        document.getElementById('d' + i)?.classList.toggle('filled', i < pinBuffer.length);
    }
}

function pinKey(k) {
    if (k === '⌫') { pinBuffer = pinBuffer.slice(0, -1); updateDots(); return; }
    if (pinBuffer.length >= 6) return;
    pinBuffer += k;
    updateDots();
    if (pinBuffer.length === 6) setTimeout(() => submitPin(), 180);
}

function submitPin() {
    if (pinMode === 'setup') {
        pinTemp = pinBuffer; pinBuffer = ''; showLockscreen('setup2');
    } else if (pinMode === 'setup2') {
        if (pinBuffer === pinTemp) {
            pins[setupName] = pinBuffer;
            savePins();
            pinTemp = '';
            unlockAs(setupName);
        } else {
            document.getElementById('ls-error').textContent = 'Koderne matcher ikke';
            pinBuffer = ''; pinTemp = ''; updateDots();
            setTimeout(() => showLockscreen('setup'), 1200);
        }
    } else if (pinMode === 'enter') {
        const match = Object.entries(pins).find(([, p]) => p === pinBuffer);
        if (match) {
            unlockAs(match[0]);
        } else {
            document.getElementById('ls-error').textContent = 'Forkert kode — prøv igen';
            pinBuffer = ''; updateDots();
        }
    }
}

function selectSetupName(name) {
    setupName = name;
    showLockscreen('setup');
}

function startChangePinFor(name) {
    closeSheet();
    setupName = name;
    showLockscreen('setup');
}

function unlockAs(name) {
    sessionStorage.setItem('minhave-unlocked', '1');
    sessionStorage.setItem('minhave-user', name);
    document.getElementById('lockscreen').classList.remove('visible');
    render();
}

function openUserMenu() {
    const user = currentUser();
    const otherUser = user === 'Steen' ? 'Linda' : 'Steen';
    openSheet(user || 'Bruger', `
        <div style="padding:0.8rem 1.2rem 0;display:flex;flex-direction:column;gap:0.7rem">
            ${canEdit() ? `
            <button class="btn-primary" style="margin:0" onclick="startChangePinFor('${user}')">Skift min PIN</button>
            <button class="btn-primary" style="margin:0;background:var(--green-mid)" onclick="startChangePinFor('${otherUser}')">Sæt ${otherUser}s PIN</button>
            <button class="btn-primary" style="margin:0;background:var(--green-mid)" onclick="startChangePinFor('Gæst')">${pins.Gæst ? 'Skift gæste-PIN' : 'Opret gæste-PIN'}</button>
            ` : ''}
            <button class="btn-primary" style="margin:0;background:var(--terra)" onclick="lockApp()">Lås appen</button>
        </div>
        <div style="padding:1.2rem 1.2rem 0.5rem;text-align:center;font-size:0.65rem;color:var(--muted);opacity:0.6">Vores Have v${VERSION}</div>`);
}

function lockApp() {
    sessionStorage.removeItem('minhave-unlocked');
    sessionStorage.removeItem('minhave-user');
    closeSheet();
    showLockscreen('enter');
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── BOOT ──
loadPhotoCache().then(() => Promise.all([loadDB(), loadPins()])).then(() => { if (checkAccess()) render(); });
</script>
</body>
