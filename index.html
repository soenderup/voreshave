<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vores Have</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vores Have">
    <meta name="theme-color" content="#2d5a27">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icons/icon-180-v2.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --green-dark: #2d5a27;
            --green-mid: #4a7c3f;
            --green-light: #e8f0e5;
            --terra: #c46b3a;
            --terra-light: #f5e8df;
            --cream: #faf7f2;
            --brown: #6b4e35;
            --text: #2a2a2a;
            --muted: #7a7a7a;
            --border: #ece9e3;
            --white: #ffffff;
        }

        html, body { height: 100%; background: var(--cream); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        body { max-width: 480px; margin: 0 auto; display: grid; grid-template-rows: auto 1fr auto; grid-template-areas: "header" "app" "nav"; }

        /* ── HEADER ── */
        #header {
            grid-area: header;
            background: var(--green-dark);
            padding: 0.9rem 1rem 0.8rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            z-index: 100;
            min-height: 54px;
        }
        #back-btn { display: none; }
        #header-center { text-align: left; }
        #header-title { color: white; font-size: 1.3rem; font-weight: 700; }
        #header-sub { color: rgba(255,255,255,0.6); font-size: 0.72rem; margin-top: 0.1rem; padding-left: 0.25rem; }
        #header-right { position: absolute; right: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        #menu-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 1.1rem;
            width: 34px; height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        #menu-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── AREA GROUPING ── */
        .area-group { padding: 1rem 1rem 0; }
        .area-header {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.7rem; cursor: pointer; user-select: none;
        }
        .area-icon { font-size: 1.25rem; }
        .area-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brown); flex: 1; }
        .area-count { font-size: 0.8rem; color: var(--muted); }
        .area-chevron { font-size: 0.7rem; color: var(--muted); transition: transform 0.2s; }
        .area-chevron.closed { transform: rotate(-90deg); }
        .area-zones { overflow: hidden; }
        .area-zones.collapsed { display: none; }

        /* ── MAIN ── */
        #app { grid-area: app; overflow-y: auto; padding-bottom: 2rem; }

        /* ── URGENT STRIP ── */
        .urgent-strip { background: var(--terra); padding: 0.6rem 1rem; }
        .attention-strip { background: #c0392b; padding: 0.6rem 1rem; }
        .strip-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .strip-header h2 { color: rgba(255,255,255,0.75); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }
        .strip-chevron { color: rgba(255,255,255,0.6); font-size: 0.85rem; transition: transform 0.2s; }
        .strip-chevron.open { transform: rotate(180deg); }
        .strip-body { margin-top: 0.5rem; }
        .urgent-item {
            display: flex; align-items: flex-start; gap: 0.5rem;
            color: white; font-size: 0.88rem; padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            cursor: pointer;
        }
        .urgent-item:last-child { border-bottom: none; }
        .urgent-dot { width: 6px; height: 6px; background: rgba(255,255,255,0.6); border-radius: 50%; flex-shrink: 0; margin-top: 0.4rem; }
        .urgent-dot.hot { background: #ffe066; }
        .urgent-meta { font-size: 0.72rem; opacity: 0.7; display: block; margin-top: 0.05rem; }

        /* ── SECTION ── */
        .section { padding: 1rem 1rem 0; }
        .section-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.7rem; }
        .section-icon { font-size: 0.95rem; }
        .section-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--brown); }

        /* ── ZONE CARD ── */
        .zone-card {
            background: var(--white);
            border-radius: 14px;
            margin-bottom: 0.7rem;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .zone-card:active { opacity: 0.85; }
        .zone-card-header { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; }
        .zone-card-left { display: flex; align-items: center; gap: 0.6rem; }
        .zone-icon { font-size: 1.1rem; }
        .zone-name { font-size: 0.98rem; font-weight: 600; color: var(--green-dark); }
        .zone-meta { font-size: 0.74rem; color: var(--muted); margin-top: 0.05rem; }
        .zone-badge { font-size: 0.68rem; background: var(--terra-light); color: var(--terra); padding: 0.2rem 0.6rem; border-radius: 999px; font-weight: 600; white-space: nowrap; }
        .zone-badge.ok { background: var(--green-light); color: var(--green-mid); }
        .flag-attention, .flag-overdue { font-size: 0.95rem; line-height: 1; flex-shrink: 0; margin-left: 0.15rem; }
        .zone-arrow { color: var(--muted); font-size: 0.9rem; margin-left: 0.3rem; }
        .sub-zone-list { padding: 0.8rem 1rem 0; }
        .sub-zone-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.5rem; padding: 0 1rem; }
        .sub-zone-card { margin-bottom: 0.5rem; }

        /* ── ZONE FOLD-UD ── */
        .zone-foldout {
            background: var(--white);
            border-radius: 14px;
            margin-bottom: 0.7rem;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
        }
        .zone-foldout-sub {
            margin: 0 0 0.5rem 0;
            border-radius: 10px;
            box-shadow: none;
            border: 1px solid var(--border);
            background: var(--cream);
        }
        .zone-foldout-header {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.85rem 1rem;
            cursor: pointer; user-select: none;
        }
        .zone-foldout-header:active { opacity: 0.8; }
        .zone-foldout-info { flex: 1; min-width: 0; }
        .zone-chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; }
        .zone-chevron.closed { transform: rotate(-90deg); }
        .zone-content { border-top: 1px solid var(--border); }
        .zone-sub-list { padding: 0.6rem 0.7rem 0; }
        .zone-element-row {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
        }
        .zone-element-row:last-child { border-bottom: none; }
        .zone-element-row:active { background: var(--cream); }
        .zone-element-info { flex: 1; min-width: 0; }
        .zone-element-name { font-size: 0.93rem; font-weight: 600; color: var(--green-dark); }
        .zone-element-meta { font-size: 0.73rem; color: var(--muted); margin-top: 0.05rem; }
        .zone-element-empty { padding: 0.8rem 1rem; font-size: 0.82rem; color: var(--muted); font-style: italic; }
        .menu-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 0 0.2rem; }
        .choice-btn { display: flex; align-items: center; gap: 0.7rem; width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 0.9rem; cursor: pointer; text-align: left; }
        .choice-btn:active { opacity: 0.8; }
        .choice-icon { font-size: 1.15rem; flex-shrink: 0; }
        .choice-label { font-size: 0.88rem; font-weight: 600; color: var(--green-dark); }
        .choice-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

        /* ── PLANT LIST ── */
        .plant-list { border-top: 1px solid var(--border); }
        .plant-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }
        .plant-row:last-child { border-bottom: none; }
        .plant-row:active { background: var(--cream); }
        .plant-name-wrap .pname { font-size: 0.9rem; font-weight: 500; }
        .plant-name-wrap .platinname { font-size: 0.73rem; color: var(--muted); font-style: italic; }
        .plant-name-wrap .ptype { display: inline-block; font-size: 0.63rem; font-weight: 600; background: var(--green-light); color: var(--green-mid); padding: 0.1rem 0.4rem; border-radius: 4px; margin-top: 0.15rem; }
        .plant-link-btn { font-size: 0.72rem; color: var(--green-mid); text-decoration: none; padding: 0.2rem 0.5rem; background: var(--green-light); border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
        .plant-list-thumb { width: 110px; height: 78px; border-radius: 8px; object-fit: cover; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(0,0,0,0.08); }
        .plant-photo-btn { width: 52px; height: 52px; border-radius: 8px; background: var(--green-light); border: 1.5px dashed var(--green-mid); color: var(--green-mid); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .zone-photo-delete { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,0.55); border: none; color: white; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ── ZONE / PLANT DETAIL ── */
        .detail-hero { background: var(--green-light); padding: 1rem; border-bottom: 1px solid var(--border); }
        .detail-hero-name { color: var(--green-dark); font-size: 1.3rem; font-weight: 700; }
        .detail-hero-sub { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }
        .hero-nav-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: none; border: none; color: var(--green-dark); font-size: 1.5rem; font-weight: 300; cursor: pointer; flex-shrink: 0; padding: 0; line-height: 1; }
        .hero-nav-btn.dim { color: var(--border); cursor: default; }
        .detail-hero-photo { width: 100%; height: 140px; object-fit: cover; display: block; border-radius: 10px; margin-top: 0.8rem; }
        .detail-hero-photo-placeholder { width: 100%; height: 90px; background: rgba(0,0,0,0.05); border-radius: 10px; margin-top: 0.8rem; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.78rem; cursor: pointer; border: 1.5px dashed var(--border); }
        /* Zone hero med foto og titel-overlay */
        .zone-hero-wrap { position: relative; margin: 0 1rem 0; border-radius: 10px; overflow: hidden; height: 140px; }
        .zone-hero-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
        .zone-hero-grad { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.42) 100%); pointer-events: none; }
        .zone-hero-name { position: absolute; bottom: 11px; left: 14px; right: 40px; color: white; font-size: 1.2rem; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,.45); line-height: 1.2; pointer-events: none; }

        /* Tabs */
        .tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 0.7rem; font-size: 0.82rem; font-weight: 600; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-btn.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }

        /* Info rows */
        .info-section { padding: 0.9rem 1rem 0; }
        .info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
        .info-row:last-child { border-bottom: none; }
        .info-row .label { color: var(--muted); }
        .info-row .val { font-weight: 500; text-align: right; max-width: 60%; }
        .info-note { margin: 0.8rem 1rem 0; background: var(--cream); border-radius: 10px; padding: 0.7rem 0.9rem; font-size: 0.85rem; color: var(--text); line-height: 1.5; }
        .info-note-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); margin-bottom: 0.3rem; }

        /* Trivseldata */
        .care-block { padding: 0.4rem 0 0.2rem; border-bottom: 1px solid var(--border); }
        .care-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; }
        .care-lbl { color: var(--muted); width: 52px; flex-shrink: 0; font-size: 0.8rem; }
        .care-track { display: flex; align-items: center; flex: 1; }
        .care-end { font-size: 0.88rem; flex-shrink: 0; }
        .care-end.l { margin-right: 0.35rem; }
        .care-end.r { margin-left: 0.35rem; }
        .care-segs { display: flex; gap: 3px; flex: 1; }
        .care-seg { height: 7px; border-radius: 4px; flex: 1; background: var(--border); }
        .care-seg.on { background: var(--green-mid); }
        .care-pills { display: flex; gap: 0.35rem; }
        .cpill { font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1.5px solid var(--border); color: var(--muted); }
        .cpill.on { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); font-weight: 600; }
        .care-migrate-banner { margin: 0.6rem 1rem 0; padding: 0.55rem 0.9rem; background: var(--green-light); border-radius: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 0.82rem; }
        .care-migrate-btn { font-size: 0.78rem; color: var(--green-dark); background: none; border: 1px solid var(--green-mid); border-radius: 6px; padding: 0.25rem 0.6rem; cursor: pointer; white-space: nowrap; }

        /* Reminders */
        .reminder-item {
            display: flex; align-items: flex-start; gap: 0.6rem;
            padding: 0.7rem 1rem; border-bottom: 1px solid var(--border);
        }
        .reminder-item:last-child { border-bottom: none; }
        .reminder-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--terra); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 0.05rem; }
        .reminder-check:hover { background: var(--terra-light); }
        .reminder-text { font-size: 0.88rem; font-weight: 500; }
        .reminder-date { font-size: 0.73rem; color: var(--muted); margin-top: 0.1rem; }
        .reminder-repeat { font-size: 0.68rem; color: var(--green-mid); background: var(--green-light); padding: 0.1rem 0.4rem; border-radius: 4px; margin-left: 0.3rem; }

        /* History */
        .history-item { display: flex; gap: 0.8rem; padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); }
        .history-item:last-child { border-bottom: none; }
        .history-date { font-size: 0.72rem; color: var(--muted); white-space: nowrap; padding-top: 0.1rem; min-width: 70px; }
        .history-text { font-size: 0.88rem; line-height: 1.4; }
        .history-tag { display: inline-block; font-size: 0.65rem; background: var(--terra-light); color: var(--terra); border-radius: 4px; padding: 0.05rem 0.35rem; margin-left: 0.3rem; }

        .empty-state { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 0.88rem; }
        .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

        /* ── BOTTOM SHEET ── */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; }
        .overlay.visible { display: block; }
        .sheet {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 480px;
            background: var(--white); border-radius: 18px 18px 0 0;
            z-index: 201; padding: 0 0 2rem;
            transition: transform 0.28s ease;
            max-height: 90vh; overflow-y: auto;
        }
        .sheet.open { transform: translateX(-50%) translateY(0); }
        .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0.8rem auto 0.5rem; }
        .sheet-title { font-size: 1rem; font-weight: 700; padding: 0.5rem 1.2rem 1rem; color: var(--text); border-bottom: 1px solid var(--border); }

        /* Form */
        .form-body { padding: 1rem 1.2rem 0; }
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown); margin-bottom: 0.35rem; }
        .field input:not([type=checkbox]), .field select, .field textarea {
            width: 100%; padding: 0.65rem 0.8rem;
            border: 1.5px solid var(--border); border-radius: 10px;
            font-size: 0.92rem; font-family: inherit; color: var(--text);
            background: var(--cream);
            -webkit-appearance: none;
        }
        .field input:not([type=checkbox]):focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--green-mid); background: white; }
        .field textarea { min-height: 80px; resize: none; }
        .field-row { display: flex; gap: 0.7rem; }
        .field-row .field { flex: 1; }

        .btn-primary {
            width: calc(100% - 2.4rem); margin: 1rem 1.2rem 0;
            background: var(--green-dark); color: white;
            border: none; border-radius: 12px; padding: 0.85rem;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
        }
        .btn-primary:active { opacity: 0.85; }
        .btn-secondary {
            width: calc(100% - 2.4rem); margin: 0.5rem 1.2rem 0;
            background: none; color: var(--green-dark);
            border: 1.5px solid var(--green-mid); border-radius: 12px; padding: 0.75rem;
            font-size: 0.88rem; cursor: pointer;
        }
        .btn-secondary:active { opacity: 0.8; }
        .status-tag { display: inline-block; font-size: 0.65rem; border-radius: 4px; padding: 0.1rem 0.4rem; margin-top: 0.15rem; font-weight: 600; }
        .status-tag.attention { background: #fdecea; color: #c0392b; }
        .status-tag.overdue   { background: #fdecea; color: #c0392b; }
        .status-tag.upcoming  { background: #fef6e4; color: #b07d00; }
        .attention-badge { margin: 0.5rem 1rem 0; background: #fdecea; color: #c0392b; border-radius: 8px; padding: 0.45rem 0.7rem; font-size: 0.82rem; font-weight: 600; }
        .history-item.has-attention { border-left: 3px solid #c0392b; padding-left: calc(1rem - 3px); }
        .history-tag.attention { background: #fdecea; color: #c0392b; }
        .field-toggle { display: flex; align-items: center; justify-content: space-between; }
        .field-toggle input[type=checkbox] { width: 22px; height: 22px; accent-color: #c0392b; cursor: pointer; }
        .btn-danger {
            width: calc(100% - 2.4rem); margin: 0.5rem 1.2rem 0;
            background: none; color: #c0392b;
            border: 1.5px solid #e8b0ac; border-radius: 12px; padding: 0.75rem;
            font-size: 0.88rem; cursor: pointer;
        }

        .section-add-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
            width: 100%; padding: 0.65rem; margin-top: 0.3rem;
            background: none; border: 1.5px dashed var(--border); border-radius: 12px;
            color: var(--muted); font-size: 0.85rem; cursor: pointer;
        }
        .section-add-btn:hover { border-color: var(--green-mid); color: var(--green-mid); }

        /* ── FOTOS ── */
        .photo-strip {
            display: flex; gap: 0.6rem; overflow-x: auto; padding: 0.8rem 1rem;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
            background: var(--green-dark);
        }
        .photo-strip::-webkit-scrollbar { display: none; }
        .photo-thumb {
            position: relative; flex-shrink: 0;
            width: 88px; height: 88px; border-radius: 10px; overflow: hidden;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.15);
        }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .photo-delete {
            position: absolute; top: 3px; right: 3px;
            width: 20px; height: 20px; border-radius: 50%;
            background: rgba(0,0,0,0.55); border: none; color: white;
            font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .photo-add {
            flex-shrink: 0; width: 88px; height: 88px; border-radius: 10px;
            background: rgba(255,255,255,0.08); border: 1.5px dashed rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.5); font-size: 1.6rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .photo-add:hover { background: rgba(255,255,255,0.14); }

        /* ── VÆKST-TIDSLINJE ── */
        .timeline-strip { display: flex; gap: 0.7rem; overflow-x: auto; padding: 0.4rem 0 0.6rem; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .timeline-strip::-webkit-scrollbar { display: none; }
        .timeline-item { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 0.35rem; cursor: pointer; }
        .tl-thumb { position: relative; width: 84px; height: 84px; border-radius: 10px; overflow: hidden; border: 2px solid var(--border); transition: border-color 0.15s; }
        .tl-thumb.is-primary { border-color: var(--green-mid); }
        .tl-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

function logError(msg, source, lineno, errorObj) {
    try {
        const user = sessionStorage.getItem('voreshave-user') || '(ikke logget ind)';
        const stack = (errorObj?.stack || (errorObj instanceof Error ? errorObj.stack : null))
            ? String(errorObj.stack).replace(new RegExp(location.origin, 'g'), '').slice(0, 1000)
            : '';
        const ctx = typeof nav !== 'undefined'
            ? [nav.view, nav.plantId ? 'plante:' + nav.plantId : '', nav.zoneId ? 'zone:' + nav.zoneId : ''].filter(Boolean).join(' · ')
            : '';
        const entry = {
            msg: String(msg).slice(0, 400),
            source: source ? String(source).replace(location.origin, '') : '',
            line: lineno || '',
            stack,
            ctx,
            user,
            time: new Date().toISOString()
        };
        ERRORLOG_REF.get().then(snap => {
            const existing = snap.exists ? (snap.data().entries || []) : [];
            const trimmed = [...existing, entry].slice(-200);
            ERRORLOG_REF.set({ entries: trimmed });
        }).catch(() => ERRORLOG_REF.set({ entries: [entry] }));
    } catch(e) { /* undgå fejl-i-fejl-loop */ }
}
window.onerror = (msg, src, line, col, error) => { logError(msg, src, line, error); return false; };

const PHOTO_DB_NAME = 'voreshave-photos';
const PHOTO_STORE = 'photos';
let photoCache = new Map();

function openPhotoDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(PHOTO_DB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(PHOTO_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function loadPhotoCache() {
    try {
        const idb = await openPhotoDB();
        await new Promise((resolve, reject) => {
            const tx = idb.transaction(PHOTO_STORE, 'readonly');
            const cursor = tx.objectStore(PHOTO_STORE).openCursor();
            cursor.onsuccess = e => {
                const c = e.target.result;
                if (c) { photoCache.set(c.key, c.value); c.continue(); }
                else resolve();
            };
            cursor.onerror = () => reject(cursor.error);
        });
    } catch (e) { console.warn('IndexedDB cache load fejlede:', e); }
}

async function savePhotoToIDB(key, base64) {
    photoCache.set(key, base64);
    try {
        const idb = await openPhotoDB();
        await new Promise((resolve, reject) => {
            const tx = idb.transaction(PHOTO_STORE, 'readwrite');
            tx.objectStore(PHOTO_STORE).put(base64, key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    } catch (e) { console.warn('IndexedDB save fejlede:', e); }
}

async function deletePhotoFromIDB(key) {
    photoCache.delete(key);
    try {
        const idb = await openPhotoDB();
        await new Promise((resolve, reject) => {
            const tx = idb.transaction(PHOTO_STORE, 'readwrite');
            tx.objectStore(PHOTO_STORE).delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    } catch (e) { console.warn('IndexedDB delete fejlede:', e); }
}

// Normalisér drainage-værdier — håndterer dansk, forkert casing og varianter
function parseDrainage(val) {
    if (!val || typeof val !== 'string') return null;
    const v = val.toLowerCase().trim().replace(/_/g, '-');
    if (v === 'well-drained' || v.startsWith('well') || v.includes('drained') || v.includes('velafd') || v.includes('sandet') || v.includes('let jord')) return 'well-drained';
    if (v === 'moist' || v.includes('fugtig') || v.includes('leret') || v.includes('våd')) return 'moist';
    if (v === 'normal' || v.includes('normal')) return 'normal';
    return null;
}

function mergeLocalPhotos() {
    (db.zones || []).forEach(z => {
        if (!z.photo && photoCache.has('zone-' + z.id)) z.photo = photoCache.get('zone-' + z.id);
        if (!zonesInitialized) collapsedZones.add(z.id);
    });
    zonesInitialized = true;
    let needsPhotoMigration = false;
    (db.plants || []).forEach(p => {
        if (!p.photo && photoCache.has('plant-' + p.id)) p.photo = photoCache.get('plant-' + p.id);
        if (!p.photos) {
            p.photos = p.photo ? [{ id: uuid(), url: p.photo, date: p.plantedDate || new Date().toISOString().slice(0,10), primary: true }] : [];
            needsPhotoMigration = true;
        }
    });
    // Migrer "Stauder" → "Staude"
    let needsTypeMigration = false;
    (db.plants || []).forEach(p => {
        if (p.type === 'Stauder') { p.type = 'Staude'; needsTypeMigration = true; }
    });
    if (needsPhotoMigration || needsTypeMigration) saveDB();
}

async function loadDB() {
    const localRaw = localStorage.getItem('voreshave-v3');
    try {
        const snap = await DATA_REF.get();
        if (snap.exists) {
            db = snap.data();
        } else {
            seedDB();
            await DATA_REF.set(db);
        }
        mergeLocalPhotos();
        localStorage.setItem('voreshave-v3', JSON.stringify(db));
    } catch (e) {
        logError('loadDB fejlede: ' + e.message, 'loadDB', '', e);
        if (localRaw) db = JSON.parse(localRaw);
        else seedDB();
        mergeLocalPhotos();
    }
    DATA_REF.onSnapshot({ includeMetadataChanges: true }, snap => {
        if (snap.exists && !snap.metadata.hasPendingWrites) {
            db = snap.data();
            mergeLocalPhotos();
            localStorage.setItem('voreshave-v3', JSON.stringify(db));
            if (sessionStorage.getItem('voreshave-unlocked') === '1') render();
        }
    });
}

function saveDB() {
    try { localStorage.setItem('voreshave-v3', JSON.stringify(db)); } catch (e) { console.warn('localStorage write failed:', e); }
    DATA_REF.set(db).catch(console.error);
}

function migratePinsToUsers(oldPins) {
    const roleMap = { 'Steen': 'admin', 'Linda': 'member', 'Gæst': 'guest' };
    return Object.entries(oldPins).map(([name, pin]) => ({
        id: uuid(), name, pin,
        role: roleMap[name] || 'member',
        initials: name[0]
    }));
}

const WMO_EMOJI = {
    0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
    45:'🌫️', 48:'🌫️',
    51:'🌦️', 53:'🌦️', 55:'🌧️',
    61:'🌦️', 63:'🌧️', 65:'🌧️',
    71:'🌨️', 73:'🌨️', 75:'❄️',
    80:'🌦️', 81:'🌧️', 82:'⛈️',
    95:'⛈️', 96:'⛈️', 99:'⛈️',
};
const DAY_NAMES = ['Søn','Man','Tir','Ons','Tor','Fre','Lør'];

function wmoEmoji(code) { return WMO_EMOJI[code] || '🌡️'; }

function windDir(deg) {
    const dirs = ['N','NØ','Ø','SØ','S','SV','V','NV'];
    return dirs[Math.round(deg / 45) % 8];
}

async function fetchWeatherIfNeeded() {
    const loc = appSettings.location;
    if (!loc?.lat || !loc?.lon) return;
    const cached = localStorage.getItem('voreshave-weather');
    if (cached) {
        try {
            const obj = JSON.parse(cached);
            if (Date.now() - obj.timestamp < 3600000 && obj.lat === loc.lat && obj.lon === loc.lon) return;
        } catch {}
    }
    try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max,winddirection_10m_dominant&current_weather=true&timezone=Europe%2FCopenhagen&forecast_days=5`;
        const res = await fetch(url);
        const json = await res.json();
        localStorage.setItem('voreshave-weather', JSON.stringify({ timestamp: Date.now(), lat: loc.lat, lon: loc.lon, data: json }));
        if (sessionStorage.getItem('voreshave-unlocked') === '1') render();
    } catch (e) { logError('Vejr fetch fejlede: ' + e.message, 'fetchWeather', '', e); }
}

function getWeatherData() {
    const cached = localStorage.getItem('voreshave-weather');
    if (!cached) return null;
    try {
        const obj = JSON.parse(cached);
        const loc = appSettings.location;
        if (!loc || obj.lat !== loc.lat || obj.lon !== loc.lon) return null;
        return obj.data;
    } catch { return null; }
}

function renderWeatherWidget() {
    const loc = appSettings.location;
    if (!loc?.lat) return '';
    const data = getWeatherData();
    if (!data) return `<div class="weather-widget" style="cursor:default">
        <div class="weather-collapsed" style="opacity:0.7">
            <span class="ww-icon">🌡️</span>
            <span class="ww-hi" style="font-weight:400;font-size:0.8rem">${loc.displayName || loc.name} — henter vejr...</span>
        </div>
    </div>`;

    const d = data.daily;
    const todayIcon = wmoEmoji(d.weathercode[0]);
    const todayHi   = Math.round(d.temperature_2m_max[0]);
    const todayLo   = Math.round(d.temperature_2m_min[0]);
    const todayRain = d.precipitation_probability_max[0];
    const todayWind = Math.round(d.windspeed_10m_max[0] / 3.6);
    const todayDir  = windDir(d.winddirection_10m_dominant[0]);

    const forecastHTML = [1,2,3,4].map(i => {
        const date = new Date(d.time[i] + 'T12:00:00');
        const rain = d.precipitation_probability_max[i];
        return `<div class="ww-day">
            <div class="wwd-lbl">${DAY_NAMES[date.getDay()]}</div>
            <div class="wwd-icon">${wmoEmoji(d.weathercode[i])}</div>
            <div class="wwd-hi">${Math.round(d.temperature_2m_max[i])}°</div>
            <div class="wwd-lo">${Math.round(d.temperature_2m_min[i])}°</div>
            <div class="wwd-rain">${rain > 10 ? '💧 ' + rain + '%' : ''}</div>
        </div>`;
    }).join('');

    const rainBit = todayRain > 10 ? `<span class="ww-dot"></span><span class="ww-rain">💧 ${todayRain}%</span>` : '';

    return `<div class="weather-widget${weatherOpen ? ' open' : ''}" onclick="weatherOpen=!weatherOpen;render()">
        <div class="weather-collapsed">
            <span class="ww-icon">${todayIcon}</span>
            <span class="ww-hi">${todayHi}°</span>
            <span class="ww-lo">(${todayLo}°)</span>
            ${rainBit}
            <span class="ww-dot"></span>
            <span class="ww-wind">💨 ${todayWind} m/s ${todayDir}</span>
            <span class="ww-chevron">▼</span>
        </div>
        <div class="ww-expanded">
            <div class="ww-expanded-inner">
                <div class="ww-divider"></div>
                <div class="ww-now">
                    <div class="ww-big-icon">${todayIcon}</div>
                    <div>
                        <div class="ww-big-temp">${todayHi}°</div>
                        <div class="ww-desc">Nat ${todayLo}° · ${loc.displayName || loc.name}</div>
                        <div class="ww-meta">
                            ${todayRain > 10 ? `<span>💧 ${todayRain}%</span>` : ''}
                            <span>💨 ${todayWind} m/s ${todayDir}</span>
                        </div>
                    </div>
                </div>
                <div class="ww-days">${forecastHTML}</div>
            </div>
        </div>
    </div>`;
}

async function geocodeLocation() {
    const q = document.getElementById('loc-input')?.value.trim();
    if (!q) return;
    const resEl = document.getElementById('loc-result');
    if (!resEl) return;
    resEl.innerHTML = '<div style="color:var(--muted);font-size:0.85rem">Søger...</div>';
    try {
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=da&format=json`;
        const res = await fetch(url);
        const json = await res.json();
        const results = json.results || [];
        if (results.length === 0) {
            resEl.innerHTML = '<div style="color:var(--terra);font-size:0.85rem">Ingen resultater. Prøv et andet stednavn.</div>';
            return;
        }
        resEl.innerHTML = results.map(r => {
            const name = [r.name, r.admin1, r.country].filter(Boolean).join(', ');
            const safeDisplay = name.replace(/'/g,"\\'");
            const safeName = r.name.replace(/'/g,"\\'");
            return `<button onclick="selectLocation(${r.latitude},${r.longitude},'${safeName}','${safeDisplay}')"
                style="display:block;width:100%;text-align:left;padding:0.65rem 0.75rem;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:0.4rem;cursor:pointer;font-size:0.88rem;color:var(--text)">
                📍 ${name}
            </button>`;
        }).join('');
    } catch (e) {
        logError('Lokationssøgning fejlede: ' + e.message, 'searchLocation', '', e);
        document.getElementById('loc-result').innerHTML = '<div style="color:var(--terra);font-size:0.85rem">Søgning fejlede. Tjek internetforbindelsen.</div>';
    }
}

// ── HELPERS ──
function zone(id) { return db.zones.find(z => z.id === id); }
function plant(id) { return db.plants.find(p => p.id === id); }
function zonePlants(zid) { return db.plants.filter(p => p.zoneId === zid); }
function subZones(zid) { return db.zones.filter(z => z.parentZoneId === zid); }
// En "direkte" zone er en ghost-zone der vises som element direkte under området
function isDirectZone(zid) {
    const z = zone(zid);
    if (!z) return false;
    if (z.isDirect) return true;
    // Heuristik for eksisterende data: type 'andet', ingen beskrivelse, ingen underzoner, præcis 1 element
    return z.type === 'andet' && !z.description && subZones(zid).length === 0 && zonePlants(zid).length === 1;
}
function entityReminders(type, id) { return db.reminders.filter(r => r.entityType === type && r.entityId === id); }
function entityHistory(type, id) { return db.history.filter(h => h.entityType === type && h.entityId === id).sort((a,b) => b.date.localeCompare(a.date)); }

function plantAttentionFlag(pid) {
    return db.history.some(h => h.entityType === 'plant' && h.entityId === pid && h.needsAttention);
}
function plantReminderStatus(pid) {
    const todayStr = new Date().toISOString().slice(0,10);
    const in7 = new Date(); in7.setDate(in7.getDate() + 7);
    const in7Str = in7.toISOString().slice(0,10);
    const reminders = entityReminders('plant', pid);
    let overdue = false, upcoming = false;
    for (const r of reminders) {
        if (r.date < todayStr) overdue = true;
        else if (r.date <= in7Str) upcoming = true;
    }
    return overdue ? 'overdue' : upcoming ? 'upcoming' : null;
}

function urgentReminders() {
    const today = new Date();
    const limit = new Date(); limit.setDate(limit.getDate() + 7);
    return db.reminders
        .filter(r => { const d = new Date(r.date); return d <= limit; })
        .sort((a,b) => a.date.localeCompare(b.date));
}

function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateShort(iso) {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short' });
}

function daysUntil(iso) {
    const diff = Math.ceil((new Date(iso) - new Date()) / 86400000);
    if (diff < 0) return 'Overskredet';
    if (diff === 0) return 'I dag';
    if (diff === 1) return 'I morgen';
    return `Om ${diff} dage`;
}

function plantUrgent(pid) {
    return db.reminders.some(r => r.entityType === 'plant' && r.entityId === pid && new Date(r.date) <= new Date());
}
function zoneAttention(zid) {
    return db.plants.some(p => p.zoneId === zid && plantAttentionFlag(p.id));
}

function zoneStatus(zid) {
    const urgent = db.reminders.filter(r => {
        if (r.entityType === 'zone' && r.entityId === zid) return new Date(r.date) <= new Date();
        if (r.entityType === 'plant') {
            const p = plant(r.entityId);
            return p && p.zoneId === zid && new Date(r.date) <= new Date();
        }
        return false;
    });
    return urgent.length > 0 ? 'urgent' : 'ok';
}

// ── NAVIGATION ──
function goTo(view, zoneId = null, plantId = null, tab = 'main') {
    nav = { ...nav, view, zoneId, plantId, tab };
    render();
    if (view === 'plant') {
        document.getElementById('app').scrollTop = 0;
        if (plantId) {
            const p = plant(plantId);
            if (p && p.latinName && !p.aiInfo) fetchPlantInfo(plantId);
        }
    }
}
function goBack() {
    goTo('home');
}
function navToPlantSibling(dir) {
    const p = plant(nav.plantId);
    if (!p || !p.zoneId) return;
    const siblings = zonePlants(p.zoneId);
    const idx = siblings.findIndex(pl => pl.id === nav.plantId);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= siblings.length) return;
    goTo('plant', nav.zoneId, siblings[newIdx].id);
}

// ── RENDER ──
function render() {
    const app = document.getElementById('app');
    const title = document.getElementById('header-title');
    const sub = document.getElementById('header-sub');

    // Bottom nav active state
    document.getElementById('nav-home').classList.toggle('active', nav.view !== 'calendar' && nav.view !== 'identify' && nav.view !== 'search');
    document.getElementById('nav-identify').classList.toggle('active', nav.view === 'identify');
    document.getElementById('nav-calendar').classList.toggle('active', nav.view === 'calendar');
    document.getElementById('nav-search').classList.toggle('active', nav.view === 'search');

    // Header viser altid det samme
    title.innerHTML = 'Vores Have';
    sub.textContent = new Date().toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });

    if (nav.view === 'home') {
        app.innerHTML = renderHome();
    } else if (nav.view === 'calendar') {
        app.innerHTML = renderCalendar();
    } else if (nav.view === 'identify') {
        app.innerHTML = renderIdentify();
    } else if (nav.view === 'plant') {
        app.innerHTML = renderPlant(nav.plantId);
    } else if (nav.view === 'search') {
        app.innerHTML = renderSearch();
        const inp = document.getElementById('search-input');
        if (inp) { inp.focus(); inp.addEventListener('input', updateSearch); }
    }

    bindEvents();
}

function renderHome() {
    const attentionPlants = db.history
        .filter(h => h.entityType === 'plant' && h.needsAttention)
        .map(h => db.plants.find(p => p.id === h.entityId))
        .filter(Boolean);
    const attentionHTML = attentionPlants.length === 0 ? '' : `
        <div class="attention-strip">
            <div class="strip-header" onclick="attentionOpen=!attentionOpen;render()">
                <h2>Kræver opmærksomhed (${attentionPlants.length})</h2>
                <span class="strip-chevron${attentionOpen ? ' open' : ''}">▼</span>
            </div>
            ${attentionOpen ? `<div class="strip-body">${attentionPlants.map(p => {
                const z = zone(p.zoneId);
                return `<div class="urgent-item" onclick="goTo('plant','${p.zoneId}','${p.id}','history')">
                    <div class="urgent-dot hot"></div>

                </div>`;
            }).join('')}</div>` : ''}
        </div>`;

    const urgent = urgentReminders();
    const URGENT_MAX = 5;
    const urgentVisible = urgent.slice(0, URGENT_MAX);
    const urgentHidden = urgent.length - urgentVisible.length;
    const urgentLabel = urgentHidden > 0 ? `Påmindelser (+${URGENT_MAX})` : `Påmindelser (${urgent.length})`;
    const urgentHTML = urgent.length === 0 ? '' : `
        <div class="urgent-strip">
            <div class="strip-header" onclick="urgentOpen=!urgentOpen;render()">
                <h2>${urgentLabel}</h2>
                <span class="strip-chevron${urgentOpen ? ' open' : ''}">▼</span>
            </div>
            ${urgentOpen ? `<div class="strip-body">${urgentVisible.map(r => {
                const days = daysUntil(r.date);
                const hot = new Date(r.date) <= new Date();
                let who = '';
                if (r.entityType === 'plant') { const p = plant(r.entityId); who = p ? p.name + ' · ' : ''; }
                else { const z = zone(r.entityId); who = z ? z.name + ' · ' : ''; }
                const navTarget = r.entityType === 'plant'
                    ? `goTo('plant','${r.entityId ? plant(r.entityId)?.zoneId : ''}','${r.entityId}','reminders')`
                    : `goTo('home')`;
                return `<div class="urgent-item" onclick="${navTarget}">
                    <div class="urgent-dot${hot ? ' hot' : ''}"></div>
                    <div>${r.text}<span class="urgent-meta">${who}${days}</span></div>
                </div>`;
            }).join('')}${urgentHidden > 0 ? `
                <div onclick="goTo('calendar')" style="padding:0.55rem 0.2rem;font-size:0.82rem;color:rgba(255,255,255,0.8);cursor:pointer;text-decoration:underline;text-underline-offset:3px">
                    + ${urgentHidden} flere → Se alle i kalenderen
                </div>` : ''}</div>` : ''}
        </div>`;

    function zoneCard(z, depth = 0) {
        const plants = zonePlants(z.id);
        const subs = subZones(z.id);
        const status = zoneStatus(z.id);
        const icon = ZONE_TYPES[z.type]?.icon || '🏡';
        const badge = `${zoneAttention(z.id) ? `<span class="flag-attention" title="Kræver opmærksomhed">🚩</span>` : ''}${status === 'urgent' ? `<span class="flag-overdue" title="Overskredet påmindelse">⚠️</span>` : ''}`;
        const collapsed = collapsedZones.has(z.id);
        const parts = [];
        if (subs.length > 0) parts.push(`${subs.length} zone${subs.length !== 1 ? 'r' : ''}`);
        parts.push(`${plants.length} element${plants.length !== 1 ? 'er' : ''}`);
        const meta = parts.join(' · ');

        const plantsHTML = plants.map(p => {
            const thumb = p.photo
                ? `<img src="${p.photoThumb || p.photo}" loading="lazy" style="width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0">`
                : `<span style="font-size:1.1rem;flex-shrink:0">🌱</span>`;
            const latin = p.latinName ? `<div class="zone-element-meta">${p.latinName}</div>` : '';
            const qty = p.quantity > 1 ? ` <span style="color:var(--muted);font-weight:400;font-size:0.85em">× ${p.quantity}</span>` : '';
            const overdueBadge = plantUrgent(p.id) ? `<span class="flag-overdue" title="Overskredet påmindelse">⚠️</span>` : '';
            const attnBadge = plantAttentionFlag(p.id) ? `<span class="flag-attention" title="Kræver opmærksomhed">🚩</span>` : '';
            return `<div class="zone-element-row" onclick="goTo('plant','${z.id}','${p.id}')">
                ${thumb}
                <div class="zone-element-info">
                    <div class="zone-element-name">${p.name}${qty}</div>
                    ${latin}
                </div>
                ${attnBadge}${overdueBadge}
                <span class="zone-arrow">›</span>
            </div>`;
        }).join('');

        const subsHTML = subs.length > 0
            ? `<div class="zone-sub-list">${subs.map(sz => zoneCard(sz, depth + 1)).join('')}</div>`
            : '';

        const emptyHTML = plants.length === 0 && subs.length === 0
            ? `<div class="zone-element-empty">Ingen elementer endnu</div>`
            : '';

        const contentHTML = collapsed ? '' : `
            <div class="zone-content">
                ${subsHTML}
                ${plantsHTML}
                ${emptyHTML}
            </div>`;

        return `<div class="${depth > 0 ? 'zone-foldout zone-foldout-sub' : 'zone-foldout'}" data-zone-id="${z.id}">
            <div class="zone-foldout-header" onclick="toggleZone('${z.id}')">
                <span class="zone-icon">${icon}</span>
                <div class="zone-foldout-info">
                    <div class="zone-name">${z.name}</div>
                    <div class="zone-meta">${meta}</div>
                </div>
                <div style="display:flex;align-items:center;gap:0.2rem">
                    ${badge}
                    ${canEdit() ? `<button onclick="event.stopPropagation();openEditZone('${z.id}')" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0.2rem 0.3rem;line-height:1" title="Rediger zone">⚙️</button>` : ''}
                    <span class="zone-chevron${collapsed ? ' closed' : ''}">▾</span>
                </div>
            </div>
            ${contentHTML}
        </div>`;
    }

    function directElementCard(z, p) {
        const status = zoneStatus(z.id);
        const attnBadge = plantAttentionFlag(p.id) ? `<span class="flag-attention" title="Kræver opmærksomhed">🚩</span>` : '';
        const badge = attnBadge + (status === 'urgent'
            ? `<span class="zone-badge">Handling krævet</span>`
            : `<span class="zone-badge ok">OK</span>`);
        const meta = [p.latinName, p.type].filter(Boolean).join(' · ');
        const thumb = p.photo
            ? `<img src="${p.photoThumb || p.photo}" loading="lazy" style="width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0">`
            : `<span class="zone-icon">🌱</span>`;
        return `<div class="zone-card" onclick="goTo('plant','${z.id}','${p.id}')">
            <div class="zone-card-header">
                <div class="zone-card-left">
                    ${thumb}
                    <div>
                        <div class="zone-name">${p.name}${p.quantity > 1 ? ` <span style="color:var(--muted);font-weight:400;font-size:0.85rem">× ${p.quantity}</span>` : ''}</div>
                        ${meta ? `<div class="zone-meta">${meta}</div>` : ''}
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:0.4rem">${badge}<span class="zone-arrow">›</span></div>
            </div>
        </div>`;
    }

    const areasHTML = Object.entries(AREAS).map(([areaKey, area]) => {
        const zones = db.zones.filter(z => (z.area || 'baghave') === areaKey && !z.parentZoneId);
        if (zones.length === 0) return '';
        const collapsed = collapsedAreas.has(areaKey);
        const urgentInArea = zones.some(z => zoneStatus(z.id) === 'urgent');
        const attnInArea = zones.some(z => zoneAttention(z.id));
        const regularZones = zones.filter(z => !isDirectZone(z.id));
        const directZones  = zones.filter(z => isDirectZone(z.id));
        const countStr = `${attnInArea ? '🚩' : ''}${urgentInArea ? '⚠️' : ''}`;
        const zonesHTML = zones.map(z => {
            if (isDirectZone(z.id)) {
                const p = zonePlants(z.id)[0];
                return p ? directElementCard(z, p) : zoneCard(z);
            }
            return zoneCard(z);
        }).join('');
        return `<div class="area-group">
            <div class="area-header" onclick="toggleArea('${areaKey}')">
                <span class="area-icon">${area.icon}</span>
                <span class="area-title">${area.label}</span>
                <span class="area-count">${countStr}</span>
                <span class="area-chevron${collapsed ? ' closed' : ''}">▾</span>
            </div>
            ${collapsed ? '' : `<div class="area-zones">${zonesHTML}</div>`}
        </div>`;
    }).join('');

    const plantsNeedingCare = db.plants.filter(p => p.water == null && p.light == null);
    const migrateBanner = canEdit() && plantsNeedingCare.length > 0 && !migrating
        ? `<div class="care-migrate-banner" id="migrate-banner">
               <span>🌿 ${plantsNeedingCare.length} element${plantsNeedingCare.length !== 1 ? 'er' : ''} mangler trivseldata</span>
               <button class="care-migrate-btn" onclick="migrateAllCareData()">Udfyld automatisk</button>
           </div>`
        : (migrating ? `<div class="care-migrate-banner" id="migrate-banner"><span>🌿 Udfylder trivseldata...</span></div>` : '');

    return `
        ${attentionHTML}
        ${urgentHTML}
        ${renderWeatherWidget()}
        ${migrateBanner}
        ${areasHTML}
`;
}

function compressImage(file, maxPx, quality) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const ratio = Math.min(maxPx / img.width, maxPx / img.height, 1);
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * ratio);
                canvas.height = Math.round(img.height * ratio);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

function base64ToBlob(base64) {
    const [meta, data] = base64.split(',');
    const mime = meta.match(/:(.*?);/)[1];
    const bytes = atob(data);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mime });
}

async function uploadPhoto(file) {
    const id = uuid();
    const [base64Full, base64Thumb] = await Promise.all([
        compressImage(file, 1200, 0.78),
        compressImage(file, 150, 0.7)
    ]);
    const refFull = fsStorage.ref(`photos/${id}.jpg`);
    const refThumb = fsStorage.ref(`photos/${id}_thumb.jpg`);
    await Promise.all([refFull.put(base64ToBlob(base64Full)), refThumb.put(base64ToBlob(base64Thumb))]);
    const [url, thumbUrl] = await Promise.all([refFull.getDownloadURL(), refThumb.getDownloadURL()]);
    return { url, thumbUrl };
}

async function uploadBase64Photo(base64) {
    const id = uuid();
    const thumbBase64 = await resizeImageForAPI(base64, 150);
    const refFull = fsStorage.ref(`photos/${id}.jpg`);
    const refThumb = fsStorage.ref(`photos/${id}_thumb.jpg`);
    await Promise.all([refFull.put(base64ToBlob(base64)), refThumb.put(base64ToBlob(thumbBase64))]);
    const [url, thumbUrl] = await Promise.all([refFull.getDownloadURL(), refThumb.getDownloadURL()]);
    return { url, thumbUrl };
}

async function deleteStoragePhoto(url) {
    if (url && url.startsWith('https://')) {
        try { await fsStorage.refFromURL(url).delete(); } catch {}
    }
}

function setPrimaryTimelinePhoto(pid, photoId) {
    const p = plant(pid);
    if (!p) return;
    (p.photos || []).forEach(ph => { ph.primary = (ph.id === photoId); });
    const primary = (p.photos || []).find(ph => ph.id === photoId);
    if (primary) { p.photo = primary.url; p.photoThumb = primary.thumbUrl || null; }
    saveDB(); render();
}

async function deleteTimelinePhoto(pid, photoId) {
    closeSheet();
    const p = plant(pid);
    if (!p) return;
    const ph = (p.photos || []).find(x => x.id === photoId);
    if (!ph) return;
    if (!confirm('Slet dette foto?')) return;
    const wasPrimary = ph.primary;
    await deleteStoragePhoto(ph.url);
    deleteStoragePhoto(ph.thumbUrl);
    p.photos = (p.photos || []).filter(x => x.id !== photoId);
    if (wasPrimary && p.photos.length > 0) {
        const newest = [...p.photos].sort((a, b) => b.date.localeCompare(a.date))[0];
        newest.primary = true;
        p.photo = newest.url;
        p.photoThumb = newest.thumbUrl || null;
    } else if (p.photos.length === 0) {
        p.photo = null;
        p.photoThumb = null;
    }
    saveDB(); render();
}

function updateTimelineLightbox() {
    const p = plant(lightboxPid);
    if (!p) return;
    const photos = (p.photos || []).slice().sort((a, b) => a.date.localeCompare(b.date));
    const idx = photos.findIndex(ph => ph.id === lightboxPhotoId);
    if (idx < 0) return;
    const ph = photos[idx];
    document.getElementById('lightbox-img').src = ph.url;
    document.getElementById('lightbox-meta').textContent =
        formatDate(ph.date) + (ph.primary ? ' · ✓ primær' : '') +
        (photos.length > 1 ? ` (${idx + 1}/${photos.length})` : '');
    const prevBtn = document.getElementById('lightbox-prev');
    const nextBtn = document.getElementById('lightbox-next');
    prevBtn.style.display = idx > 0 ? 'flex' : 'none';
    nextBtn.style.display = idx < photos.length - 1 ? 'flex' : 'none';
    const actionsEl = document.getElementById('lightbox-actions');
    if (actionsEl && canEdit()) {
        actionsEl.innerHTML =
            (!ph.primary ? `<button onclick="setPrimaryTimelinePhoto('${lightboxPid}','${ph.id}');updateTimelineLightbox()"
                style="background:rgba(255,255,255,0.15);border:none;color:white;padding:0.45rem 0.9rem;border-radius:8px;font-size:0.8rem;cursor:pointer">⭐ Sæt som primær</button>` : '') +
            `<button onclick="deleteTimelinePhoto('${lightboxPid}','${ph.id}')"
                style="background:rgba(180,0,0,0.5);border:none;color:white;padding:0.45rem 0.9rem;border-radius:8px;font-size:0.8rem;cursor:pointer">🗑 Slet</button>`;
    }
}

function lightboxNav(dir) {
    if (!lightboxPid) return;
    const p = plant(lightboxPid);
    if (!p) return;
    const photos = (p.photos || []).slice().sort((a, b) => a.date.localeCompare(b.date));
    const idx = photos.findIndex(ph => ph.id === lightboxPhotoId);
    const newIdx = idx + dir;
    if (newIdx >= 0 && newIdx < photos.length) {
        lightboxPhotoId = photos[newIdx].id;
        updateTimelineLightbox();
    }
}

const MONTH_NAMES = ['januar','februar','marts','april','maj','juni','juli','august','september','oktober','november','december'];

async function openPlantSuggestions(pid) {
    const p = plant(pid);
    if (!p) return;

    openSheet(`💡 Anbefalinger til ${p.name}`, `
        <div id="suggestions-body" style="padding:0.5rem 0">
            <div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:0.88rem">Henter anbefalinger...</div>
        </div>
        <button class="btn-secondary" onclick="openPlantSuggestions('${pid}')">↺ Søg igen</button>`);

    try {
        const res = await fetch('/.netlify/functions/recommendations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ plant: { id: p.id, name: p.name, latinName: p.latinName, type: p.type } }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = data.items || [];

        const body = document.getElementById('suggestions-body');
        if (!body) return;

        if (!items.length) {
            body.innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:0.88rem">Ingen anbefalinger fundet – prøv igen.</div>`;
            return;
        }

        body.innerHTML = items.map((item, i) => {
            const monthNames = (item.months || []).map(m => MONTH_NAMES[m - 1]).join(', ');
            const now = new Date().getMonth() + 1;
            const sorted = [...(item.months || [])].sort((a, b) => ((a - now + 12) % 12) - ((b - now + 12) % 12));
            const m = sorted[0] || (new Date().getMonth() + 1);
            const year = now > m ? new Date().getFullYear() + 1 : new Date().getFullYear();
            const date = `${year}-${String(m).padStart(2, '0')}-01`;
            const safeText = item.text.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
            return `<div id="sugg-${i}" style="padding:0.9rem 1rem;border-bottom:1px solid var(--border)">
                <div style="font-size:0.9rem;line-height:1.45;color:var(--text);margin-bottom:0.4rem">${item.text}</div>
                <div style="font-size:0.72rem;color:var(--muted);margin-bottom:0.6rem">📅 ${monthNames}</div>
                <button onclick="addSuggestionAsReminder('plant','${p.id}','${date}','${safeText}','sugg-${i}')"
                    style="background:var(--green-dark);color:white;border:none;border-radius:8px;padding:0.35rem 0.8rem;font-size:0.8rem;cursor:pointer">
                    + Tilføj til kalender
                </button>
            </div>`;
        }).join('');
    } catch (e) {
        logError('Anbefalinger fejlede: ' + e.message, 'fetchRecommendations', '', e);
        const body = document.getElementById('suggestions-body');
        if (body) body.innerHTML = `<div style="padding:1rem;color:#c0392b;font-size:0.85rem">Kunne ikke hente anbefalinger – prøv igen.</div>`;
    }
}

                    placeholder="Eks: det er ikke meldug · det er en buske, ikke en klatreplante · bladene er runde, ikke spidse"
                    oninput="identifyState.correction=this.value"
                >${identifyState.correction || ''}</textarea>

                <button class="btn-secondary" style="margin-top:0.5rem" onclick="cancelCorrection()">Annuller</button>
            </div>`;
    } else if (result) {
        if (result.notRecognized) {
            resultHTML = `
                <div class="identify-result-card" style="padding:1.2rem;text-align:center">
                    <div style="font-size:1.5rem;margin-bottom:0.5rem">🤷</div>
                    <div style="font-weight:600;color:var(--text)">Kunne ikke identificere</div>
                    <div style="font-size:0.85rem;color:var(--muted);margin-top:0.3rem">
                        Prøv med et tydeligere billede eller tilføj en beskrivelse
                    </div>
                </div>`;
        } else {
            const conf = result.confidence || 0;
            const confClass = conf >= 0.75 ? 'high' : conf >= 0.5 ? 'medium' : 'low';
            const confLabel = conf >= 0.75 ? '✓ Høj sikkerhed' : conf >= 0.5 ? '~ Middel sikkerhed — tjek selv' : '⚠ Lav sikkerhed — tjek selv';
            const confPct = Math.round(conf * 100);
            resultHTML = `
                <div class="identify-result-card">
                    ${result.response ? `
                    <div style="background:var(--cream);border-bottom:1px solid var(--border);padding:0.85rem 1.2rem;font-size:0.88rem;color:var(--text);line-height:1.5;font-style:italic">
                        💬 ${result.response}
                    </div>` : ''}
                    <div class="identify-result-header">
                        <div class="identify-result-name">${result.name || 'Ukendt plante'}</div>
                        ${result.latinName ? `<div class="identify-result-latin">${result.latinName}</div>` : ''}
                        ${result.type ? `<div class="identify-result-type">${result.type}</div>` : ''}
                    </div>
                    <div class="identify-confidence ${confClass}">${confLabel} (${confPct}%)</div>
                    ${result.description ? `<div class="identify-result-desc">${result.description}</div>` : ''}
                    <div class="identify-actions">
                        ${canEdit() ? `<button class="btn-primary" onclick="openAddPlantFromIdentify()">+ Opret element</button>` : ''}
                        <button class="btn-secondary" onclick="startCorrection()">↩ Prøv igen</button>
                        <div style="display:flex;gap:0.5rem;margin-top:0.2rem">
                            ${result.latinName ? `<a href="https://da.wikipedia.org/wiki/${encodeURIComponent(result.latinName)}" target="_blank" rel="noopener"
                                style="flex:1;text-align:center;padding:0.6rem;border:1px solid var(--border);border-radius:10px;font-size:0.82rem;color:var(--muted);text-decoration:none;background:var(--white)">
                                📖 Wikipedia
                            </a>` : ''}
                            <a href="https://www.google.dk/search?q=${encodeURIComponent((result.name || '') + ' plante')}" target="_blank" rel="noopener"
                                style="flex:1;text-align:center;padding:0.6rem;border:1px solid var(--border);border-radius:10px;font-size:0.82rem;color:var(--muted);text-decoration:none;background:var(--white)">
                                🔎 Google
                            </a>
                        </div>
                    </div>
                </div>`;
        }
    }

    return `<div class="identify-wrap">
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--brown);margin-bottom:1rem">
            Identifikation via foto
        </div>
        ${uploadHTML}
        ${hintHTML}
        ${!result ? btnHTML : ''}
        ${resultHTML}
    </div>`;
}

function previewIdentifyImage(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        resizeImageForAPI(e.target.result, 800).then(resized => {
            identifyState.imageDataUrl = resized;
            identifyState.result = null;
            const app = document.getElementById('app');
            app.innerHTML = renderIdentify();
        });
    };
    reader.readAsDataURL(file);
}

function resizeImageForAPI(dataUrl, maxPx) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxPx || h > maxPx) {
                if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
                else       { w = Math.round(w * maxPx / h); h = maxPx; }
            }
            const c = document.createElement('canvas');
            c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', 0.85));
        };
        img.src = dataUrl;
    });
}

async function identifyPlant() {
    if (!identifyState.imageDataUrl) return;
    const btn = document.getElementById('identify-btn') || document.getElementById('identify-retry-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Analyserer...'; }

    try {
        const res = await fetch('/.netlify/functions/identify-plant', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                imageBase64: identifyState.imageDataUrl,
                hint: identifyState.hint || '',
                correction: identifyState.correction || '',
            }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        identifyState.result = await res.json();
    } catch (e) {
        logError('Identificer fejlede: ' + e.message, 'identifyPlant', '', e);
        identifyState.result = { notRecognized: true };
    }
    identifyState.correcting = false;
    identifyState.correction = '';

    const app = document.getElementById('app');
    app.innerHTML = renderIdentify();
}

function resetIdentify() {
    identifyState = { imageDataUrl: null, result: null, hint: '', correcting: false, correction: '' };
    const app = document.getElementById('app');
    app.innerHTML = renderIdentify();
}

function startCorrection() {
    identifyState.correcting = true;
    identifyState.correction = '';
    document.getElementById('app').innerHTML = renderIdentify();
}

function cancelCorrection() {
    identifyState.correcting = false;
    identifyState.correction = '';
    document.getElementById('app').innerHTML = renderIdentify();
}

function openDiagnose(pid) {
    diagnoseState = { imageDataUrl: null, plantId: pid };
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    // Ingen capture-attribut → iOS viser native vælger: Tag foto / Fotoarkiv / Gennemse
    // Input skal være i DOM for at onchange virker ved fotoarkiv-valg i iOS Safari
    document.body.appendChild(input);
    input.onchange = async (e) => {
        document.body.removeChild(input);
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const resized = await resizeImageForAPI(ev.target.result, 800);
            diagnoseState.imageDataUrl = resized;
            showDiagnoseHintsSheet();
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

        });

function submitAddPlantFromIdentify() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    let zid = document.getElementById('f-zone').value;
    if (zid === '__direct__') {
        const areaKey = document.getElementById('f-area')?.value || 'baghave';
        const dz = { id: uuid(), name, type: 'andet', area: areaKey, description: '', parentZoneId: null, isDirect: true };
        db.zones.push(dz);
        zid = dz.id;
    }
    if (!zid) return;
    const qty = parseInt(document.getElementById('f-qty').value) || 1;
    const photoBase64 = identifyState.imageDataUrl || null;
    const r = identifyState.result || {};
    const newPlant = {
        id: uuid(), zoneId: zid, name,
        latinName: document.getElementById('f-latin').value.trim(),
        type: document.getElementById('f-type').value,
        quantity: qty > 1 ? qty : null,
        plantedDate: document.getElementById('f-date').value,
        note: document.getElementById('f-note').value.trim(),
        infoLink: document.getElementById('f-link').value.trim(),
        photo: photoBase64,
        water: r.water || null,
        light: r.light || null,
        perennial: r.perennial != null ? r.perennial : null,
    };
    db.plants.push(newPlant);
    saveDB(); closeSheet();
    identifyState = { imageDataUrl: null, result: null, hint: '' };
    goTo('plant', zid, newPlant.id);
    fetchPlantInfo(newPlant.id);
    // Upload foto til Firebase Storage i baggrunden
    if (photoBase64) {
        savePhotoToIDB('plant-' + newPlant.id, photoBase64);
        uploadBase64Photo(photoBase64).then(({ url, thumbUrl }) => {
            const pFresh = plant(newPlant.id);
            if (pFresh) { pFresh.photo = url; pFresh.photoThumb = thumbUrl; saveDB(); }
        }).catch(err => logError('Identify-foto upload fejlede: ' + err.message, 'uploadIdentifyPhoto', ''));
    }
}

function renderSearch() {
    return `
        <div class="search-wrap">
            <div class="search-input-row">
                <span>🔍</span>
                <input id="search-input" type="search" placeholder="Søg i planter og zoner…"
                    autocomplete="off" autocorrect="off" spellcheck="false"
                    value="${searchQuery || ''}">
