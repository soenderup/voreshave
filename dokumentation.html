async function dekrypter() {
  const pw = document.getElementById('kode').value;
  if (!pw) return;
  try {
    const buf  = Uint8Array.from(atob(D), c => c.charCodeAt(0));
    const salt = buf.slice(0, 32);
    const iv   = buf.slice(32, 44);
    // Resten: ciphertext + tag(16 bytes bagest)
    const data = buf.slice(44);

    const km  = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    const html = new TextDecoder().decode(dec);
    document.open(); document.write(html); document.close();
  } catch {
    const el = document.getElementById('fejl');
    if (el) { el.textContent = 'Forkert adgangskode.'; setTimeout(() => { if(el) el.textContent=''; }, 2000); }

}
