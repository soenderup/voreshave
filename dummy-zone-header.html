<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dummy — Zone Header</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #f0f4f0; }

  /* App-header */
  .app-header {
    background: #3a6b35;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }
  .app-header .back { font-size: 15px; opacity: .85; }
  .app-header .title { font-size: 20px; font-weight: 700; }
  .app-header .date { font-size: 13px; opacity: .7; }
  .header-right { margin-left: auto; display: flex; gap: 8px; }
  .btn-circle {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white; cursor: pointer;
  }

  /* Zone hero */
  .zone-hero {
    position: relative;
    margin: 16px 16px 0;   /* samme afstand som padding i siderne */
    border-radius: 14px;
    overflow: hidden;
    height: 140px;
    background: #c8d8c0;   /* fallback hvis intet foto */
  }
  .zone-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Gradient overlay i bunden */
  .zone-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 40%,
      rgba(0,0,0,0.55) 100%
    );
  }
  /* Titel-label */
  .zone-hero-title {
    position: absolute;
    bottom: 14px;
    left: 16px;
    right: 16px;
    color: white;
    font-size: 24px;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,.4);
    line-height: 1.2;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid #ddd;
    background: white;
    margin-top: 0;
  }
  .tab {
    flex: 1; text-align: center;
    padding: 14px 0;
    font-size: 15px;
    color: #888;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active {
    color: #3a6b35;
    font-weight: 600;
    border-bottom-color: #3a6b35;
  }

  /* Content */
  .content { padding: 16px; }
  .plant-card {
    background: white; border-radius: 12px;
    padding: 14px; margin-bottom: 10px;
    font-size: 15px; color: #333;
  }
</style>
</head>
<body>

<!-- App-header -->
<div class="app-header">
  <span class="back">← Tilbage</span>
  <div>
    <div class="title">🌿 Vores Have</div>
    <div class="date">tirsdag 26. maj</div>
  </div>
  <div class="header-right">
    <div class="btn-circle">S</div>
    <div class="btn-circle">✏️</div>
    <div class="btn-circle">+</div>
  </div>
</div>

<!-- Zone hero med foto og titel som overlay -->
<div class="zone-hero">
  <!-- Brug et placeholder-foto -->
  <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80" alt="Blomsterkrukker på fliser">
  <div class="zone-hero-overlay"></div>
  <div class="zone-hero-title">Blomsterkrukker på fliser</div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active">Oversigt (3)</div>
  <div class="tab">Påmindelser (0)</div>
  <div class="tab">Historik (0)</div>
</div>

<!-- Indhold -->
<div class="content">
  <div class="plant-card">🌸 Geranium</div>
  <div class="plant-card">🌿 Lavendel</div>
  <div class="plant-card">🌻 Petunia</div>
</div>

</body>
</html>
